name: Build & Test

on:
  push:
    branches: [ main, "feature/**", "fix/**" ]
  pull_request:
    branches: [ main ]

env:
  VERSION_PREFIX: "1.0.0"
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the "Getestete Plattformen" list in README.md
        # (Ubuntu 24.04, Windows 10/11, macOS 13+). Public repo — Actions
        # minutes are unmetered for standard runners.
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: .NET 8 SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: NuGet-Pakete wiederherstellen
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:Version=${{ env.VERSION_PREFIX }}.${{ env.BUILD_NUMBER }}

      - name: Tests ausführen
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Coverage-Bericht hochladen
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker-Image bauen
        run: docker build --build-arg VERSION=${{ env.VERSION_PREFIX }}.${{ env.BUILD_NUMBER }} -t mcp-easyverein:${{ env.VERSION_PREFIX }}.${{ env.BUILD_NUMBER }} .
