  /api/v1.7/contact-details/mass-action:
    patch:
      tags:
      - contact-details
      summary: '

        The mass action endpoint

        This does basicly the same like the bulk endpoints but with a filter

        instead of ids

        '
      produces:
      - application/json
      responses:
        '401':
          description: The authentification token is not permitted or was not transmitted
          headers:
            Authorization:
              type: string
              description: Bearer <YOUR-API-KEY>
        '403':
          description: The transaction was refused (missing permission)
        '500':
          description: Something went wrong on the server side (should not happen)
        '200':
          description: The transaction was successful
        '400':
          description: The validation of the provided fields failed, see the body to get more information
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                useSessionFilter:
                  type: boolean
                  description: A boolean indicating that the session filter will be used or not. Either this must be defined
                    or customFilter
                customFilter:
                  type: integer
                  summary: The ID of the custom filter either as string or integer
                  description: The id of the custom filter that will be used. Either this must be defined or useSessionFilter
                data:
                  type: object
                  required: true
                  description: The fields and values that will be changed in mass
      security:
      - bearerAuth:
        - write:all
        - read:all
  /api/v1.7/contact-details/bulk-create:
    post:
      tags:
      - contact-details
      summary: '

        Create multible entries of an endpoint in one request to save performance and requests

        '
      produces:
      - application/json
      responses:
        '401':
          description: The authentification token is not permitted or was not transmitted
          headers:
            Authorization:
              type: string
              description: Bearer <YOUR-API-KEY>
        '403':
          description: The transaction was refused (missing permission)
        '500':
          description: Something went wrong on the server side (should not happen)
        '200':
          description: The transaction was successful
        '400':
          description: The validation of the provided fields failed, see the body to get more information
        '201':
          description: The entry was successfully created
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  summary: The entries that should be bulk created
                  description: The entries to bulk create are listet inside the array
                  items:
                    type: object
      security:
      - bearerAuth:
        - write:all
        - read:all
  /api/v1.7/contact-details/bulk-update:
    patch:
      tags:
      - contact-details
      summary: '

        Update multible entries of an endpoint in one request to save performance and requests

        This is much more energy efficient than doing the updates of multible entries induvidually

        Note that every entry needs an id-key so the api can assign them

        '
      produces:
      - application/json
      responses:
        '401':
          description: The authentification token is not permitted or was not transmitted
          headers:
            Authorization:
              type: string
              description: Bearer <YOUR-API-KEY>
        '403':
          description: The transaction was refused (missing permission)
        '500':
          description: Something went wrong on the server side (should not happen)
        '200':
          description: The transaction was successful
        '400':
          description: The validation of the provided fields failed, see the body to get more information
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  summary: The entries that should be bulk created
                  description: The entries to bulk create are listet inside the array
                  items:
                    type: object
                    required: true
                    summary: Every entry needs to have the id set
                    properties:
                      id:
                        type: integer
                        summary: The id of the entry to change
      security:
      - bearerAuth:
        - write:all
        - read:all
  /api/v1.7/contact-details/mass-delete:
    delete:
      tags:
      - contact-details
      summary: '

        Deleting all entries that are matching a specific filter (either session-filter or custom-filter)

        '
      produces:
      - application/json
      responses:
        '401':
          description: The authentification token is not permitted or was not transmitted
          headers:
            Authorization:
              type: string
              description: Bearer <YOUR-API-KEY>
        '403':
          description: The transaction was refused (missing permission)
        '500':
          description: Something went wrong on the server side (should not happen)
        '204':
          description: The entry was successfully deleted, NOTE that most entries will get into the wastebasket if they are
            deleted once - only a second delete in the wastebasket endpoint will remove the entry
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                useSessionFilter:
                  type: boolean
                  description: A boolean indicating that the session filter will be used or not. Either this must be defined
                    or customFilter
                customFilter:
                  type: integer
                  summary: The ID of the custom filter either as string or integer
                  description: The id of the custom filter that will be used. Either this must be defined or useSessionFilter
      security:
      - bearerAuth:
        - write:all
        - read:all
