      - name: contactDetailsPk
        in: path
        summary: The {contactDetailsPk} in the url
        description: The primary key (id) of the entry that is referring to this endpoint
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                entries:
                  type: array
                  summary: The entries that should be bulk created
                  description: The entries to bulk create are listet inside the array
                  items:
                    type: object
                    required: true
                    summary: Every entry needs to have the id set
                    properties:
                      id:
                        type: integer
                        summary: The id of the entry to change
      security:
      - bearerAuth:
        - write:all
        - read:all
