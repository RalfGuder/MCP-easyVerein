openapi: 3.0.0
info:
  title: easyVerein REST-API documentation
  version: v1.7
  defaultVersion: v1.7
  host: https://easyverein.com/api/v1.7
  description: "\n<h2>This version is the stable version, you can use the alias <code>stable</code></h2>\n\n<h2>General overview</h2>\n\
    <p>This API provides you with access to data and routines of the easyVerein software and allows you to integrate easyVerein\
    \ into other tools and services.\nYou may access and update information stored in easyVerein using this API or invoke\
    \ procedures of this software.\nYou may use this API to build your custom workflows, exchange data with tools or extend\
    \ the functionality of the software.\n<b>Requests are limited to 100/min.</b>\n</p>\n<h3>Responsibility</h3>\n<p>Please\
    \ read the instructions carefully. \nBe aware that we cannot take any responsibility when you alter, disclose or delete\
    \ any data unintentionally. \nAny API call authenticated with your API token is taken as a data processing instruction\
    \ of your organization. \n§3 and §4 of our data processing agreement (AVV) also applies to  instructions given by using\
    \ the API. \nThis also applies when you call API endpoints by using scripts, third-party applications, external tools\
    \ or other software solutions.</p>\n<h3>Support</h3>\n<p>Please note that our customer support team cannot provide you\
    \ with support for our API services.\nIf you have questions regarding this API that are not covered by our documentation\
    \ our support team may forward your request to our technical team but please be aware that it might take longer than usual\
    \ to get a response.\nOur technical team cannot check or verify your implementations and scripts.\nWe cannot provide you\
    \ with support for custom software or third-party applications.</p>\n<h3 id=\"auth\">Authentication</h3>\n<p>To use this\
    \ API you need to transfer a token for every request within the header. To do so you need to set a header variable like\
    \ this: <code>'Authorization': 'Bearer &lt;YOUR-API-KEY&gt;'</code>.</p>\n\n<p>Please note that in newer versions of the\
    \ API the token expire after 30 days except they get refreshed</p>\n\n<h3>Applications</h3>\n<p>An application is also\
    \ a normal member but with the <code>_isApplication</code> flag set to <code>true</code>. To make a new application we\
    \ strongly recommend to send the applications data to\nyour backend and send them from there to the API using the token\
    \ of the organization. We also recommend the use of any spam prevention like the reCaptcha.</p>\n<h3>Good to know</h3>\n\
    <p>The member- and the contact-details- table needs each other, if you plan to create a user, please do it like this:\n\
    First create a contact-details (POST to the contact-details endpoint) and enter at least all required fields.\nThe fields\
    \ that are required depends on the <code>'_isCompany'</code> attribute. If it is set to \"true\", <code>'companyName'</code>\
    \ is the only field you\nhave to define. If it is set to \"false\" (which is the default), you need to define at least\
    \ the <code>'firstName'</code> and the <code>'familyName'</code>.\nAfter you have successfully created the contact details,\
    \ you can create a member.\nThe required fields for the member are: <code>'emailOrUserName'</code> and <code>'contactDetails'</code>.\
    \ \nIf you set <code>'_isApplication'</code> to \"true\" you automatically create a membership application which can be\
    \ manually reviewed within the software. We recommend to do so if you build your own application form.\nPlease note: The\
    \ relationship of contactDetails to member is a composition, the member requires the contactDetails, the contactDetails\
    \ can exist without a member.</p>\n<p>You can reference to the contact-details-endpoint (and any other relation) in three\
    \ ways:</p>\n<ol>\n\t<li>With a string, containing the http-reference like the API shows the relation (for example <code>https://easyverein.com/api/v1.7/contact-details/{pk}</code>)</li>\n\
    \t<li>With a string, containing the primary key (pk) of the reference</li>\n\t<li>With an integer as the primary key (pk)\
    \ of the reference</li>\n</ol>\n<p><b>It is highly recommended</b> to use the <code>?query</code> term if possible. The\
    \ API will optimize the performance depending on the queried data. So please consider that the API can be faster if you\
    \ limit the fields to get.</p>\n<p>It is also possible to define the amount of entries to view per page using the <code>?limit</code>\
    \ term. The default value of it is 5 and the maximum value is 100</p>\n<h4>What about this bulk-endpoints?</h4>\n<p>The\
    \ <code>bulk-update</code> and <code>bulk-create</code> endpoints can include multiple requests for the same endpoint.\
    \ It is possible to use these endpoints to create or change a big amount of entries in just one single request.</p>\n\
    <p>This is much more time saving and even energy efficient than doing a single request per entry.</p>\n<p><strong>We recommend</strong>\
    \ to use these endpoints when possible to improve performance, saving energy and time.</p>\n<h4>Why doesn't each endpoint\
    \ have a bulk endpoint?</h4>\n<p>It is theoretically possible to activate this for every endpoint. For now the bulks are\
    \ just active for:<code>member</code>,<code>contact-details</code>,<code>invoice</code>,<code>event</code>,<code>booking</code>,<code>lending</code>,<code>application-form-element</code>,<code>organization-token</code>,<code>^member/(?P&lt;userPk&gt;(\\\
    d+))/custom-fields</code>,<code>^contact-details/(?P&lt;contactDetailsPk&gt;(\\d+))/custom-fields</code>,<code>^event/(?P&lt;eventPk&gt;(\\\
    d+))/custom-fields</code>,<code>^inventory-object/(?P&lt;inventoryObjectPk&gt;(\\d+))/custom-fields</code>,<code>^member/(?P&lt;userPk&gt;(\\\
    d+))/groups</code>,<code>^custom-field/(?P&lt;customFieldPk&gt;(\\d+))/select-options</code>,<code>participation-price-group</code>,</p>\n\
    <p>We just think that the bulk actions are not usefully for every endpoint.</p>\n<h4>How to upload a file? (e.g. <code>_profilePicture</code>)</h4>\n\
    <p>Uploading a file isn't possible for POST requests. It is possible to PATCH files though. Uploading with a PATCH just\
    \ works like a normal PATCH but with a special header set:</p>\n<code>'Content-Disposition': 'attachment; name=\"samplename\"\
    ; filename=\"samplepicture.jpg\"'</code>\n<p>The body of the PATCH includes the key of the field to upload the file for\
    \ (e.g. <code>_profilePicture</code>) and a byte stream as value.</p>\n<h3>Samples</h3>\n<p>For further examples on how\
    \ this API works, please take a look on our <a href=\"https://gitlab.com/easyverein-public/api-samples\">REST-API-Samples</a>\
    \ hosted on GitLab.</p>\n<p>There is also an inofficial <a href=\"https://github.com/Fensterbank/easyverein\">Node.js\
    \ library</a> and some actively developed projects (for example a <a href=\"https://github.com/egtofficial/egt-vereinsbot\"\
    >Discord Bot</a> and a custom <a href=\"https://github.com/egtofficial/egt-payment\">payment page</a>) on GitHub! Thanks\
    \ to <a href=\"https://github.com/Fensterbank\">Fensterbank</a> for sharing his implementations!</p>\n<p>The API has also\
    \ an unofficial (community) <a href=\"https://github.com/waza-ari/python-easyverein\">python library</a> now!</p>\n<br>\n\
    <p>A good sample for a get request with nested query:</p>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v1.7/member?query={id,contactDetails{id,name},org{id,name,short},emailOrUserName,membershipNumber}</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"membershipNumber\": \"<span id=\"firstRequestMembershipNumber\"></span>\"\
    ,\n\t\t\t\"org\": {\n\t\t\t\t\"id\": <span id=\"firstRequestOrgId\"></span>,\n\t\t\t\t\"short\": \"<span id=\"firstRequestOrgShort\"\
    ></span>\",\n\t\t\t\t\"name\": \"<span id=\"firstRequestOrgName\"></span>\"\n\t\t\t}, \n\t\t\t\"id\": <span id=\"firstRequestId\"\
    ></span>, \n\t\t\t\"contactDetails\": {\n\t\t\t\t\"id\": <span id=\"firstRequestContactDetailsId\"></span>,\n\t\t\t\t\"\
    name\": \"<span id=\"firstRequestContactDetailsName\"></span>\"\n\t\t\t},\n\t\t\t\"emailOrUserName\": \"<span id=\"firstRequestEmailOfUserName\"\
    ></span>\"\n\t\t}\n\t</code>\n</pre>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v1.7/contact-details?query={id,customFields{addressObject{customFields{addressObject{id}}}}}</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"id\": <span id=\"secondRequestId\"></span>,\n\t\t\t\"customFields\"\
    : [{\n\t\t\t\t\"addressObject\": {\n\t\t\t\t\t\"customFields\": \"https://easyverein.com/api/v1.7/contact-details/<span\
    \ id=\"secondRequestLinkId\"></span>/custom-fields/\"\n\t\t\t\t}\n\t\t\t}]\n\t\t}\n\t</code>\n</pre>\n<p>There is a recursion\
    \ limit for the API to prevent the same entry from being retrieved again in a request.</p>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v1.7/member?query={id,customFields{-org,-userObject,-_deleteAfterDate,-_deletedBy}}</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"id\": <span id=\"thirdRequestId\"></span>,\n\t\t\t\"customFields\":\
    \ [{\n\t\t\t\t\"id\": <span id=\"thirdRequestCustomFieldId\"></span>,\n\t\t\t\t\"customField\": \"https://easyverein.com/api/v1.7/custom-field/<span\
    \ id=\"thirdRequestLinkId\"></span>\",\n\t\t\t\t\"value\": \"<span id=\"thirdRequestValue\"></span>\"\n\t\t\t}]\n\t\t\
    }\n\t</code>\n</pre>\n<p>\n\tIt is also possible to define a negative query to exclude some fields from a response, this\
    \ can be helpfully if a request needs most of the fields but does not need all.\n\tThis is made possible by putting a\
    \ '-' in front of the field: <code>?query={-$field}</code>\n</p>\n\n<h1>Changelog:</h1>\n\n<div id=\"scrollable\">\n<h2>Endpoints:</h2>\n\
    <ul>\n<li>\n<h4>member:</h4>\n</li>\n<li>GET: Showing all user group relations, even if they are in the future (<code>member/$id/groups</code>)</li>\n\
    <li>GET: The <code>member/me/permissions</code> endpoint has been extended with the <code>invoiceRequestEnabled</code>\
    \ parameter, which specifies whether the requesting user is authorized to upload invoice requests</li>\n<li>POST: Improved\
    \ the <code>change-password</code> mechanism to support 2FA allowing app users to stay logged in (needs also an update\
    \ for the app)</li>\n<li>POST: Fixed a crash in the API for the <code>sync</code> and <code>unsync</code> actions. Changed\
    \ that this actions can use the custom filter or session filter as alternative to a list of ids now.</li>\n<li>GET: Added\
    \ <code>customField</code> and <code>id__in</code> filters for the <code>member/$id/custom-fields</code> endpoint</li>\n\
    <li>GET: Added the new filter <code>memberGroupsCurrentlyActive</code> to filter for members that are currently active\
    \ in a user group</li>\n<li>PATCH: Changed that members must not point to themselves via <code>_relatedMember</code> or\
    \ <code>relatedMembers</code></li>\n<li>POST/PATCH/GET: Added the <code>signatureText</code> attribute to the api, only\
    \ admins can change their own <code>signatureText</code>.</li>\n<li>POST/PATCH/DELETE: Fixed that <code>member/$id/groups</code>\
    \ does require member permissions instead of account permissions to change/create/delete an entry</li>\n<li>PATCH: It\
    \ is now possible to delete files (except the <code>_profilePicture</code>), added <code>sepaMandateFile</code> to the\
    \ files that can be uploaded</li>\n<li>GET: Fixed that <code>member/$id/custom-fields</code> shows only the fields related\
    \ to the specified member</li>\n<li>POST: Fixed that the <code>membershipNumber</code> gets automatically applied when\
    \ the <code>assignMemberIdAutomatically</code> and <code>_nextMemberId</code> are set</li>\n<li>GET: <code>integrationDosbSport</code>\
    \ is now a reference</li>\n<li>POST/PATCH: <code>integrationDosbSport</code> can now be changed by chairmen</li>\n<li>PATCH:\
    \ Added a new action <code>set-dosb</code> to add or remove dosb sports to a member and creating new DosbSport entries\
    \ for the new <code>dosb-sport</code> endpoint if needed</li>\n<li>GET: Fixed that <code>paymentAmount</code> will always\
    \ be either <code>null</code> or a string for <code>member/$id/groups</code></li>\n<li>GET: Fixed that <code>memberGroups</code>\
    \ does correctly get rendered fixing a crash</li>\n<li>POST/PATCH: [<strong>breaking</strong>] Considering the new field\
    \ <code>needsAdminApproval</code> for custom fields in <code>member/$id/custom-fields</code>. Members need to fill <code>requestedValue</code>\
    \ instead of <code>value</code> when <code>needsAdminApproval</code> is set to True</li>\n<li>GET: Added custom filter\
    \ support for the virtual field <code>age</code></li>\n<li>PATCH: Sending out an email when <code>requestedValue</code>\
    \ for the <code>member/$id/custom-fields</code> endpoint is reset by an admin (the value change was either accpeted or\
    \ refused)</li>\n<li>GET: Considering <code>user_members_groupaccess='a'</code> correctly</li>\n<li>PATCH: Fixed that\
    \ the file upload will also work for admins on their own profile</li>\n<li>PATCH: Fixed that the files uploaded in <code>member/$id/custom-fields</code>\
    \ will get stored in the corresponding user folder</li>\n<li>PATCH: Fixed that <code>sepaMandateFile</code> can be uploaded\
    \ by admins on their own profile</li>\n<li>GET: Added filters to filter for chairmen with some specific module permissions</li>\n\
    <li>GET/PATCH: Fixed that chairmen can now see their own profile like they should</li>\n<li>POST/PATCH: Fixed that <code>_chairmanPermissionGroup</code>\
    \ can be set</li>\n<li>POST: Improved that <code>change-password</code> does not only generate a new token but also refreshes\
    \ the current (browser) session so the user does not get logged out</li>\n<li>PATCH: Fixed a crash for <code>set-dosb</code>\
    \ when the id is not a number</li>\n<li>GET: Fixed that <code>sepaMandateFile</code> is now a link to the file instead\
    \ of just the name of the file</li>\n<li>GET: Added the new action <code>send-welcome-mail</code></li>\n<li>DELETE: Fixed\
    \ a crash in a raw edgecase for <code>member/$id/groups</code></li>\n<li>POST/PATCH/GET: Added the <code>_isBlocked</code>\
    \ and <code>blockReason</code> attributes so chairmen with the module permission <code>members</code> can block users\
    \ from using easyverein</li>\n<li>PATCH: Changed that most of all fields can be changed for synced users even with <code>syncUserDataBidirectionally=False</code></li>\n\
    <li>DELETE: Now logging the rejection of a application</li>\n<li>POST/PATCH: Changed that the API does not tolerate escaped\
    \ unicode in <code>member/$id/custom-fields</code> when the additional has no escaped unicode</li>\n<li>POST/PATCH: Added\
    \ a validation for <code>start</code> and <code>end</code> in <code>member/$id/groups</code> so <code>start</code> must\
    \ be smaller than <code>end</code></li>\n<li>\n<h4>member-group:</h4>\n</li>\n<li>POST: Added the <code>removeDosbSports</code>\
    \ action for the API to remove dosb sports from users in a user group</li>\n<li>POST: Considering the org setting <code>invoiceMembershipFeeDefaultBankAccount</code>\
    \ now</li>\n<li>POST: The fields <code>nextGroup</code> and <code>agePermission</code> will now require each other (they\
    \ do only make sense together)</li>\n<li>GET: Changed that <code>linkedItems</code> will only count currently active relations</li>\n\
    <li>POST/PATCH: [<strong>breaking</strong>] Changed that <code>short</code> must be unique</li>\n<li>POST/PATCH: Fixed\
    \ that <code>nextGroup</code> and <code>agePermission</code> need each other</li>\n<li>POST: Added logging for all one-time-actions\
    \ of member groups.</li>\n<li>\n<h4>contact-details:</h4>\n</li>\n<li>GET: Fixed that <code>copiedInstances</code> and\
    \ <code>_copiedFromParent</code> will show the entries again (They were always empty)</li>\n<li>GET: Considering the <code>memberAreaShowChairmenInProfile</code>.\
    \ Allowing normal members to see the contact data of all chairmen if it is set to true</li>\n<li>POST: Added a new action\
    \ <code>set-sync-end-date</code> to set the <code>endDate</code> of a synced address (an empty body indicates a reset\
    \ of this attribute)</li>\n<li>POST: Added a new action <code>set-sync-start-date</code> to set the <code>startDate</code>\
    \ of a synced address (an empty body indicates a reset of this attribute)</li>\n<li>DELETE: Deleting a <code>contactDetails</code>\
    \ is now only allowed when it is not linked to a <code>member</code></li>\n<li>GET: Added a new boolean filter: <code>member__isnull</code></li>\n\
    <li>GET: Changed that <code>geoPositionCoords</code> will always be an object</li>\n<li>GET: Fixed that chairmen can see\
    \ their own custom fields like for everyone else</li>\n<li>PATCH: Fixed that admins may change all fields on their own\
    \ address that they can change on others addresses</li>\n<li>GET: Fixed that users with no member view permission can\
    \ see their own profile when <code>memberAreaShowChairmenInProfile</code> is <code>True</code></li>\n<li>GET: Added filters\
    \ to filter for addresses of chairmen with some specific module permissions</li>\n<li>POST/PATCH: Made <code>companyEmailInvoice</code>\
    \ mandatory when <code>sendInvoiceCompanyMail</code> is set to <code>True</code></li>\n<li>PATCH: Fixed that the <code>contactDetailsGroups</code>\
    \ can be changed on the own address from chairman users</li>\n<li>PATCH: Fixed that admins can change their own <code>iban</code>\
    \ and <code>bic</code> even if the <code>methodOfPayment</code> is set to debit</li>\n<li>GET: Fixed that anonymous requests\
    \ will lead to a crash</li>\n<li>GET: Improved the performance a little bit</li>\n<li>GET: Searching through the email\
    \ fields is no longer possible</li>\n<li>POST/PATCH: Changed that the API does not tolerate escaped unicode in <code>contact-details/$id/custom-fields</code>\
    \ when the additional has no escaped unicode</li>\n<li>PATCH: Fixed that companies will require the <code>companyName</code>\
    \ and not <code>firstName</code> and <code>familyName</code></li>\n<li>POST: Fixed that <code>additionalAdressInfo</code>\
    \ is no longer a required field (what it was not until recently)</li>\n<li>POST/PATCH: Fixed that <code>methodOfPayment</code>\
    \ can be set again</li>\n<li>\n<h4>contact-details-group:</h4>\n</li>\n<li>GET: Changed that <code>linkedItems</code>\
    \ will only count currently active relations</li>\n<li>POST/PATCH: [<strong>breaking</strong>] Changed that <code>short</code>\
    \ must be unique</li>\n<li>POST: Creation of contact-details-group is now logged</li>\n<li>\n<h4>protocol:</h4>\n</li>\n\
    <li>POST/PATCH: Fixed that the <code>allDay</code> attribute will set the <code>start</code> and <code>end</code> automatically\
    \ for the protocol, as is already the case with events</li>\n<li>POST/PATCH: Fixed that <code>calendar</code> can be set\
    \ again</li>\n<li>PATCH/POST: Fixed that <code>locationName</code> gets set to the name of the <code>locationObject</code>\
    \ if it is given</li>\n<li>POST/PATCH: Fixed that a <code>protocolElement</code> can't be set as a child of another <code>protocolElement</code>\
    \ if it has children itself</li>\n<li>GET: Fixed that <code>confirmationToAddresses</code> cannot be seen by normal members</li>\n\
    <li>GET: Fixed that <code>visibleForExport</code> is considered properly, so that anyone who doesn't have protocol permissions\
    \ can only see what should be visible for members</li>\n<li>GET: Fixed that deleted protocol elements will not be returned\
    \ in <code>protocolElements</code> and <code>parentProtocolElements</code></li>\n<li>\n<h4>protocol-upload:</h4>\n</li>\n\
    <li>ALL: Fixed that this endpoint does not crash</li>\n<li>POST/PATCH: Enabled this endpoint to support posting/patching\
    \ again</li>\n<li>ALL: Changed the name of the <code>protocolFilePath</code> to <code>protocolFile</code> since it makes\
    \ more sense</li>\n<li>GET: Fixed that normal users can always see uploaded entries if they are released</li>\n<li>\n\
    <h4>protocol-element:</h4>\n</li>\n<li>PATCH: Considering the edge case that the <code>state</code> can be changed from\
    \ \"Wiedervorlage\" to \"Vertagt\" even for locked protocols elements</li>\n<li>\n<h4>topic:</h4>\n</li>\n<li>POST/PATCH:\
    \ Fixed that the topic <code>type</code> can only be changed by chairmen</li>\n<li>POST: Fixed a crash in the API for\
    \ normal users</li>\n<li>GET: There is now a relation between the forum endpoint and member-group endpoint to restrict\
    \ the access of normal members. Since topics are always associated with forums, they are now also restricted for non-admins.</li>\n\
    <li>GET: Fixed that a none-integer as pk does not crash the api</li>\n<li>GET: Fixed a bug where posts could occur more\
    \ than once in the response and where requesting a single topic caused an error</li>\n<li>\n<h4>[New] reset-password:</h4>\n\
    </li>\n<li>\n<p>POST: Added a new endpoint to the API: <code>reset-password</code> to trigger the password reset email\
    \ sending via API. This endpoint is available in every version of the API</p>\n</li>\n<li>\n<h4>[New] announcement:</h4>\n\
    </li>\n<li>\n<p>GET: Added the <code>announcement</code> endpoint to inform users using the API (necessary for the app).\
    \ This is a read only endpoint</p>\n</li>\n<li>\n<h4>invoice:</h4>\n<ul>\n<li>POST/PATCH: Fixed that the org token can\
    \ be used to generate invoice PDFs</li>\n<li>POST/PATCH: Changed that <code>relatedAddress</code> is not mandatory anymore,\
    \ instead it is only required when <code>receiver</code> is not set and the org token is creating the entry (so no <code>relatedAddress</code>\
    \ or <code>receiver</code> can be assumed)</li>\n<li>POST/PATCH/GET: Added <code>removeFileOnDelete</code> to determine\
    \ if the file in the <code>path</code> of an invoice should also be removed when deleting the invoice</li>\n<li>PATCH:\
    \ Fixed that <code>invNumber</code> doesn't get reset when changing some values on an existing invoice as normal member</li>\n\
    <li>POST/PATCH: Changed that a submitted delivery will not get deleted automatically after 90 days</li>\n<li>PATCH: [<strong>breaking</strong>]\
    \ Changed that <code>relatedBookings</code> can now only be set when the invoice is not a draft/template or request</li>\n\
    <li>POST/PATCH: Fixed that if <code>showEPCQRCode</code> is enabled and all necessary attributes are set, the pdf generation\
    \ will also show the giro code qr-code</li>\n<li>POST/PATCH: Fixed that the <code>paymentDifference</code> gets computed\
    \ again when changing the <code>relatedBookings</code></li>\n<li>GET: Fixed the <code>relatedBookings</code> filter to\
    \ be distinct</li>\n<li>POST: Fixed that <code>receiver</code> gets filled correctly when adding a new invoice with <code>isRequest=True</code></li>\n\
    <li>PATCH/DELETE: Considering the <code>bookkeepingLockCommitDate</code> setting now</li>\n<li>GET: Fixed a bug where\
    \ <code>paymentDifference</code> got returned even though <code>memberAreaShowInvoiceStatusInProfile</code> was disabled</li>\n\
    <li>POST: Fixed a bug where <code>payedFromUser</code> was not set when the requesting user is a chairman and the field\
    \ is not set in the request</li>\n<li>POST/PATCH: Fixed that <code>paymentInformation</code> can be set again</li>\n<li>DELETE:\
    \ Invoices that are not deletable cannot be deleted anymore</li>\n</ul>\n</li>\n<li>\n<h4>event:</h4>\n</li>\n<li>POST/PATCH:\
    \ Fixed that the participations are logged</li>\n<li>GET: Set the virtual <code>isInterval</code> attribute for events,\
    \ indicating if an event is recurring. NOTE: This attribute is only temporarly for the app, it will get obsolete if the\
    \ api gets capable of managing recurring appointments</li>\n<li>POST/PATCH: Chairmen can now add a price group from this\
    \ endpoint (was possible before but only for the <code>price-group</code> endpoint)</li>\n<li>GET: Normal Members can\
    \ see the <code>priceGroups</code> of an event now</li>\n<li>POST: <code>priceGroup</code> is now a mandatory field for\
    \ participations (only if a <code>priceGroup</code> is related to a <code>event</code>)</li>\n<li>GET: Fixed that the\
    \ <code>event/$id/custom-fields</code> endpoint does only show entries related to the defined id</li>\n<li>PATCH: Changed\
    \ that the own <code>priceGroup</code> can be changed from users in <code>event/$id/participation</code></li>\n<li>PATCH/POST:\
    \ Fixed that <code>locationName</code> gets set to the name of the <code>locationObject</code> if it is given</li>\n<li>GET:\
    \ Added a new virtual field <code>isProtocol</code> to check if the event is also a protocol, added the field as filter\
    \ as well</li>\n<li>GET: Fixed that copying the event will also copy the custom fields and price groups</li>\n<li>GET/POST/PATCH:\
    \ Added the new fields <code>isReservation</code>, <code>creator</code>, and <code>reservationParentEvent</code> in relation\
    \ to reservations for locations</li>\n<li>ALL: Implemented the new functionality of reservations for events. If <code>isReservation</code>\
    \ is set to <code>true</code> the <code>locationObject</code> must also be set</li>\n<li>GET: [<strong>breaking</strong>]\
    \ Changed that <code>participations</code> will allways return the reference to the participations instead of the amount\
    \ of participations when <code>memberAreaCalendarShowParticipantsStatus</code> is set to <code>0</code></li>\n<li>GET:\
    \ Fixed a rare edgecase where the <code>priceGroup</code> is not a valid field for the query when there is no entry to\
    \ see causing the user to catch a 400 instead of a 200 with an empty list</li>\n<li>GET/POST/PATCH: Changed the <code>creator</code>\
    \ field to reference to contact-details instead of members</li>\n<li>POST/PATCH: Changed that the API does not tolerate\
    \ escaped unicode in <code>event/$id/custom-fields</code> when the additional has no escaped unicode</li>\n<li>GET/PATCH/POST:\
    \ [<strong>breaking</strong>] Added a new endpoint <code>event/$id/custom-fields/$customFieldId/select-options</code>\
    \ representing chosen options for select fields (custom fields with <code>settings_type</code> <code>a</code> and <code>s</code>).\
    \ For these fields <code>selectedOptions</code> replaces the <code>value</code> attribute</li>\n<li>\n<p>GET/PATCH/POST:\
    \ [<strong>breaking</strong>] The field <code>priceGroup</code> is replaced by the field <code>participationToPriceGroups</code>\
    \ pointing to <code>participation-price-group</code> that represents a cross link to the <code>priceGroup</code></p>\n\
    </li>\n<li>\n<h4>price-group:</h4>\n</li>\n<li>\n<p>GET/PATCH/POST: [<strong>breaking</strong>] Renamed <code>price</code>\
    \ to <code>sellingPrice</code></p>\n</li>\n<li>\n<h4>voting:</h4>\n</li>\n<li>\n<p>DELETE: Fixed that votings can only\
    \ be deleted by chairmen that have <code>voting=w</code> as permission</p>\n</li>\n<li>PATCH: Extended the voting action\
    \ for not authenticated users with verified emails and for invite-votings</li>\n<li>GET: Added a new filter: <code>hasParticipated</code>\
    \ to filter for votings where the requesting user has already voted</li>\n<li>GET: Fixed that <code>votedParticipantsIds</code>\
    \ is an array</li>\n<li>GET: Added two new virtual attributes: <code>hasParticipated</code> indicating whether the requesting\
    \ user has already voted, <code>linkedQuestions</code> showing the amount of <code>voting-question</code> linked to the\
    \ voting</li>\n<li>POST/PATCH: Changed that <code>access=1</code> will reset the <code>allowedMemberGroups</code> because\
    \ it does not make any sense to restrict public votings by the member group</li>\n<li>GET: Changed that normal members\
    \ can only view votings that has started</li>\n<li>POST/PATCH: Changed that <code>restrictByMemberGroups</code> is a virtual\
    \ field meaning it must not be provided anymore, <code>allowedMemberGroups</code> is sufficient to restrict by member\
    \ groups</li>\n<li>POST/PATCH/GET: Added a <code>submissionNote</code></li>\n<li>POST: Fixed a crash when creating a voting</li>\n\
    <li>PATCH: Changed that calling <code>voting/$id/vote</code> using the same <code>generatedParticipantId</code> twice\
    \ is not allowed anymore</li>\n<li>\n<p>POST/PATCH/GET: [<strong>breaking</strong>] Implemented <code>adminVisibility</code>\
    \ and changed <code>memberVisibility</code> to be more specific in order to have more precise settings for votings</p>\n\
    </li>\n<li>\n<h4>voting-question:</h4>\n</li>\n<li>DELETE: Fixed that voting questions can only be deleted by chairmen\
    \ that have <code>voting=w</code> as permission</li>\n<li>GET: Fixed that if the <code>votingMode</code> is set to 1 the\
    \ API does not crash</li>\n<li>POST/PATCH: Fixed that <code>votings</code> cannot be below 1 or above the amount of answer\
    \ options</li>\n<li>POST/PATCH/GET: Implemented a <code>order</code> to make it possible to manually change the order\
    \ of the questions of a voting</li>\n<li>GET: Fixed a crash for normal members</li>\n<li>GET: Changed that normal members\
    \ can only view voting questions with votings that has started</li>\n<li>GET: [<strong>breaking</strong>] Considering\
    \ <code>adminVisibility</code> and the improved <code>memberVisibility</code></li>\n<li>\n<p>GET: Fixed that voters which\
    \ only authenticate with their email are also count in the number of participants (only relevant for public elections)</p>\n\
    </li>\n<li>\n<h4>session-filter:</h4>\n</li>\n<li>ALL: Made the session filter endpoint available for normal members</li>\n\
    <li>\n<h4>billing-account:</h4>\n</li>\n<li>GET: Added a new virtual field named <code>linkedBookings</code> counting\
    \ the amount of bookings that are related to the billing-account</li>\n<li>POST/PATCH: <code>name</code> and <code>number</code>\
    \ must be unique now</li>\n<li>GET: Fixed the performance for <code>linkedBookings</code></li>\n<li>GET: Added a new virtual\
    \ field named <code>linkedBookings</code> counting the amount of bookings that are related to the billing-account</li>\n\
    <li>GET: Added the <code>number</code> to the fields to search for</li>\n<li>GET: Fixed that the filter <code>accountingPlan__isnull</code>\
    \ will be distinct</li>\n<li>GET: Renamed the filter <code>accountingPlans__isnull</code> to <code>accountingPlan__isnull</code>\
    \ since this matches the attributes name it correlates with</li>\n<li>PATCH/GET/DELETE: Enabled the wastebasket for this\
    \ endpoint</li>\n<li>PATCH/POST: <code>name</code> and <code>number</code> must only be unique to the own organization</li>\n\
    <li>\n<h4>bank-account:</h4>\n</li>\n<li>GET/POST/PATCH: Removed the <code>bookings</code> and <code>invoices</code> since\
    \ this endpoint is a group and groups should not point to their relations and also it has made this endpoint inperformant</li>\n\
    <li>POST: Removed <code>IBAN</code> and <code>BIC</code> from the required fields</li>\n<li>\n<h4>booking:</h4>\n</li>\n\
    <li>GET/POST/PATCH: Added the new field <code>bookingProject</code></li>\n<li>POST/PATCH: [<strong>breaking</strong>]\
    \ <code>relatedInvoice</code> now have to be no draft/template or request invoices</li>\n<li>POST/PATCH: Fixed that the\
    \ <code>paymentDifference</code> gets computed again when changing the <code>relatedInvoice</code></li>\n<li>GET: Fixed\
    \ the <code>relatedInvoice</code> filter to be distinct</li>\n<li>PATCH: Fixed that <code>bookingProject</code> and <code>bankAccount</code>\
    \ can be changed</li>\n<li>PATCH/DELETE: Considering the <code>bookkeepingLockCommitDate</code> setting now</li>\n<li>\n\
    <h4>custom-tax-rate:</h4>\n</li>\n<li>DELETE: Deleting custom tax rates is possible now</li>\n<li>GET: Include default\
    \ tax rates in the response data</li>\n<li>GET: Added new field <code>countryCode</code> that is only set for default\
    \ tax rates for a country</li>\n<li>GET/POST/PATCH: <code>customTaxRate</code> cannot be <code>null</code> anymore and\
    \ the new default value is <code>0.00</code></li>\n<li>\n<h4>task:</h4>\n</li>\n<li>POST: It is now possible for normal\
    \ users to assign themselves to a public task using a POST request to <code>assign-to-me</code> and <code>unassign</code></li>\n\
    <li>PATCH: Fixed that chairmen can change the <code>state</code> and all other (normal) attributes of a task despite they\
    \ are assigned to it</li>\n<li>GET: [<strong>breaking</strong>] Changed that the <code>sendEmail</code> is now <code>send-email</code>\
    \ and needs only a get request instead of a post</li>\n<li>\n<h4>task-group:</h4>\n</li>\n<li>POST/PATCH: [<strong>breaking</strong>]\
    \ Changed that <code>short</code> must be unique</li>\n<li>\n<h4>organization-settings:</h4>\n</li>\n<li>ALL: Added the\
    \ new field <code>appLayout</code> and its validation to this endpoint</li>\n<li>PATCH: Fixed that chairmen can change\
    \ the organization settings</li>\n<li>PATCH/GET: Added <code>automaticGroupPayment</code> to the organization</li>\n<li>PATCH/GET:\
    \ Added new fields <code>_emailTextTemplateNewMemberSyncNotification</code>, <code>_emailTextTemplateNewMemberSyncNotificationSubject</code>,\
    \ <code>activateNewMemberSyncNotification</code></li>\n<li>PATCH/GET: Added new field <code>sepa_pain_file_limit</code>\
    \ <strong>important</strong>: Most banks have a limit of 999 payments per SEPA direct debit file. If there is no special\
    \ arrangement between you and your bank, don't change this value.</li>\n<li>PATCH: Chairmen that are <code>dropBoxOwner</code>\
    \ can change the value of <code>allowAllAdminsToUseDropBox</code> now</li>\n<li>GET: Added the <code>short</code> field\
    \ for normal members</li>\n<li>GET: Fixed that <code>memberAreaMemberListColumns</code> will contain <code>emailOrUserName</code>\
    \ instead of <code>email</code> (changed a deprecated feature)</li>\n<li>GET: Changed that <code>memberCount</code> and\
    \ <code>currentMemberCount</code> can be viewed by chairmen with <code>module_members=r</code></li>\n<li>GET: Normal members\
    \ can the <code>memberAreaShowChairmenInProfile</code> now</li>\n<li>GET/PATCH: <code>invoiceMembershipFeeDefaultBankAccount</code>\
    \ is now a relation field that will be validated</li>\n<li>GET: Fixed a crash occurring when admins with not <code>module_account</code>\
    \ privileges want to get the organization</li>\n<li>PATCH: Changed that <code>_documentTemplate</code> is only writeable\
    \ when <code>_availableDocumentTemplate</code> is empty and can only bet set to <code>default</code>, <code>centered</code>\
    \ or <code>structured</code></li>\n<li>PATCH: Made <code>_availableDocumentTemplate</code> read only</li>\n<li>GET/PATCH:\
    \ Implemented <code>includeResignationDayInPartialGroupInvoices</code></li>\n<li>PATCH: Implemented the change of <code>_debitName</code>,\
    \ <code>_debitIBAN</code>, and <code>_debitBIC</code></li>\n<li>GET/PATCH: Added field <code>membershipFeePartialInvoicingPrecision</code>\
    \ to set whether partial invoicing for membership fees should be calculated for the total number of days or months</li>\n\
    <li>GET/PATCH: Added new field <code>bookkeepingSkr42Spheres</code> for setting the SKR 42 spheres that should be available\
    \ to use</li>\n<li>\n<p>GET: Added the new action <code>trend</code> to show the trend of the member numbers in the organization</p>\n\
    </li>\n<li>\n<h4>billing-account:</h4>\n</li>\n<li>GET: Added a new virtual field named <code>linkedBookings</code> counting\
    \ the amount of bookings that are related to the billing-account</li>\n<li>\n<p>GET: Added the <code>number</code> to\
    \ the fields to search for</p>\n</li>\n<li>\n<h4>contact-details-log:</h4>\n</li>\n<li>DELETE: Fixed a crash when trying\
    \ to delete a contact-details-log</li>\n<li>PATCH: Fixed that after the creation of the contact-details-log it is only\
    \ possible to upload a file and change the <code>shared</code> status</li>\n<li>PATCH: Fixed that <code>relatedFile</code>\
    \ can be uploaded</li>\n<li>ALL: [<strong>breaking</strong>] Changed that <code>members</code> permissions are needed\
    \ to use this endpoint instead of <code>memberLogin</code></li>\n<li>GET: Fixed that invoice files are not correctly referenced\
    \ for <code>relatedFile</code></li>\n<li>\n<h4>lending:</h4>\n</li>\n<li>POST/PATCH: Changed that chairmen can set the\
    \ <code>borrowingDate</code> and <code>borrowTime</code> in the past</li>\n<li>PATCH: Fixed that the <code>borrowMember</code>\
    \ gets assigned to the requesting user if it is not specified only on POST</li>\n<li>GET: Fixed that searching for the\
    \ <code>name</code> works</li>\n<li>PATCH: Fixed that the validation of <code>quantity</code> does ignore the currently\
    \ changed lendings <code>quality</code></li>\n<li>POST: Fixed that a email notification is triggered when a new lending\
    \ request is made</li>\n<li>\n<h4>inventory-object:</h4>\n</li>\n<li>DELETE: Changed that inventory objects linked to\
    \ a lending that has not <code>state=returned</code> can no longer be deleted, because it makes no sense to delete an\
    \ object if it is still lent out</li>\n<li>PATCH/POST: Fixed that <code>locationName</code> gets set to the name of the\
    \ <code>locationObject</code> if it is given</li>\n<li>GET: Changed that <code>inventoryObjectGroups</code> will give\
    \ the <code>id</code> and <code>name</code> of the group for normal members instead of the <code>pk</code> and <code>name</code></li>\n\
    <li>POST/PATCH: Changed that the API does not tollerate escaped unicode in <code>inventory-object/$id/custom-fields</code>\
    \ when the addional has no escaped unicode</li>\n<li>GET: add filters <code>customField</code> and <code>customField__member_show</code>\
    \ for inventory-object custom-fields</li>\n<li>\n<h4>inventory-object-group:</h4>\n</li>\n<li>GET: Changed that <code>linkedItems</code>\
    \ will only count currently active relations</li>\n<li>POST/PATCH: [<strong>breaking</strong>] Changed that <code>short</code>\
    \ must be unique</li>\n<li>\n<h4>chairman-level:</h4>\n</li>\n<li>DELETE: Deleting chairman-level groups that are linked\
    \ to a user of any kind (meaning chairmen and the organization token) is not possible anymore. Fixing a bug that could\
    \ be used to leverage the admin light feature.</li>\n<li>GET: Changed that <code>linkedItems</code> will only count currently\
    \ active relations</li>\n<li>POST/PATCH: [<strong>breaking</strong>] Changed that <code>short</code> must be unique</li>\n\
    <li>GET: Added the new <code>weight</code> attribute for admin light</li>\n<li>\n<p>POST/PATCH: Fixed that the API returns\
    \ a error message when the license limit of administrators is reached instead of just crashing</p>\n</li>\n<li>\n<h4>custom-field:</h4>\n\
    </li>\n<li>\n<p>GET: Fixed that custom fields that are not member custom fields (<code>kind=e</code>) can be viewed always\
    \ by normal users</p>\n</li>\n<li>GET/POST/PATCH: Added the <code>collection</code> nested field</li>\n<li>GET: Fixed\
    \ a crash</li>\n<li>POST/PATCH: Fixed that chairmen (with the correct privileges) can change the value of their own custom\
    \ fields even when the custom field has <code>member_edit=False</code> set</li>\n<li>DELETE: Fixed a crash when the field\
    \ to delete is a dsgvo field</li>\n<li>DELETE: Fixed a wrong 400 error that occurred instead of a 204</li>\n<li>PATCH:\
    \ Fixed that <code>member_show</code> and <code>member_edit</code> will be ignored when they are <code>True</code> and\
    \ <code>member_dsgvo</code> is also <code>True</code></li>\n<li>PATCH: Changed that <code>additional</code> can now be\
    \ reordered and not used options can also be removed</li>\n<li>POST/PATCH: Changed that <code>member_show</code> is allowed\
    \ for inventory-object custom-fields now</li>\n<li>\n<p>DELETE: Fixed that if a customfield is in the wastebasket, the\
    \ attached assignments are no longer displayed</p>\n</li>\n<li>\n<h4>price-group:</h4>\n</li>\n<li>GET: Normal Members\
    \ can now see price groups</li>\n<li>PATCH: The <code>price</code> can now be set to 0</li>\n<li>POST/PATCH/GET: Added\
    \ new fields: <code>billingAccount</code>, <code>costCentre</code>, <code>sphere</code>, <code>gross</code>, <code>taxName</code>,\
    \ <code>taxRate</code>, <code>pieces</code>, <code>reservedPieces</code>, <code>hasUnlimitedPieces</code></li>\n<li>\n\
    <h4>[New] custom-field-collection:</h4>\n</li>\n<li>ALL: Added the new custom field collection endpoint to the api</li>\n\
    <li>GET: Enabled the wastebasket for this endpoint</li>\n<li>\n<h4>[New] organization-token:</h4>\n</li>\n<li>ALL: Implemented\
    \ a endpoint to manage the organization token, replacing the old appApi (The token cannot be edited by the organization\
    \ (=&gt; token) itself)</li>\n<li>ALL: Added logging of API token generation, deletion, refreshing etc. in the login log</li>\n\
    <li>\n<h4>[New] dosb-sport:</h4>\n</li>\n<li>ALL: Added the new endpoint for dosb-sports</li>\n<li>\n<h4>[New] booking-project:</h4>\n\
    </li>\n<li>ALL: Added the new endpoint for booking projects</li>\n<li>PATCH: Fixed the uniqueness validation for <code>name</code></li>\n\
    <li>\n<h4>forum:</h4>\n</li>\n<li>GET: Added a indicator if the requesting user has viewed the forum</li>\n<li>GET: Fixed\
    \ the viewed indicator sometimes crashing the api</li>\n<li>GET: There is now a relation between the forum endpoint and\
    \ member-group endpoint to restrict the access of normal members.</li>\n<li>POST/PATCH: It is now possible to post IDs\
    \ of member-group's to the new field \"userGroups.\"</li>\n<li>\n<h4>post:</h4>\n</li>\n<li>GET: There is now a relation\
    \ between the forum endpoint and member-group endpoint to restrict the access of normal members. Since posts are always\
    \ associated with forums, they are now also restricted for non-admins.</li>\n<li>GET: Fixed a bug where posts could occur\
    \ more than once in the response</li>\n<li>\n<h4>[New] notification-token:</h4>\n</li>\n<li>ALL: Added a new endpoint\
    \ to set/view the own firebase notification tokens</li>\n<li>\n<h4>[New] notification-log:</h4>\n</li>\n<li>ALL: Added\
    \ a new endpoint to display the app notification logs. This is a read only endpoint</li>\n<li>\n<h4>calendar:</h4>\n</li>\n\
    <li>GET: Changed that <code>linkedItems</code> will only count currently active relations</li>\n<li>POST/PATCH: [<strong>breaking</strong>]\
    \ Changed that <code>short</code> must be unique</li>\n<li>\n<h4>invoice-item:</h4>\n</li>\n<li>PATCH: Allowing patching\
    \ a invoice item now</li>\n<li>POST/PATCH: Allowing to set the <code>billingAccount</code></li>\n<li>POST/PATCH: Considering\
    \ the status of the <code>relatedInvoice</code></li>\n<li>\n<p>GET/POST: Added the field <code>article</code> connecting\
    \ this endpoint to the <code>article-object</code> endpoint</p>\n</li>\n<li>\n<h4>[New] forgot-short:</h4>\n</li>\n<li>PATCH:\
    \ Added a new endpoint to the API: <code>forgot-short</code> to trigger the org short email sending via API. This endpoint\
    \ is available in every version of the API</li>\n<li>\n<h4>location:</h4>\n</li>\n<li>GET/POST/PATCH: Added the new fields\
    \ <code>isReservable</code>, <code>reservationPlanName</code>, and <code>reservationPlanColor</code> in relation to reservations\
    \ for locations</li>\n<li>\n<p>PATCH: If <code>isReservable</code> is turned off while it was on previously, all reservations\
    \ of that location will be deleted.</p>\n</li>\n<li>\n<h4>[New] get-sso-token:</h4>\n</li>\n<li>\n<p>GET: Added the new\
    \ endpoint to login in the web when the user is already authenticated in the API</p>\n</li>\n<li>\n<h4>statistics:</h4>\n\
    </li>\n<li>\n<p>GET: Added the api object to the statistics, containing the <code>latest_version</code> and <code>stable_version</code>\
    \ of the API</p>\n</li>\n<li>\n<h4>custom-filter:</h4>\n</li>\n<li>DELETE: Fixed a API crash when deleting a custom filter</li>\n\
    </ul>\n<h2>All endpoints:</h2>\n<ul>\n<li>GET: Improved the performance for nested queries of every endpoint except the\
    \ forum related, <code>feature-request</code> and organization related endpoints (considered unstable)</li>\n<li>GET:\
    \ Fixed a bug when <code>org</code> is defined in a query but will also appear on nested fields</li>\n<li>GET: Fixed that\
    \ existing entries that reference to entries in the wastebasket cannot make the api crash</li>\n</ul>\n<h2>Generic:</h2>\n\
    <ul>\n<li>Supporting Bearer tokens now. It is recommended to use <code>Bearer</code> instead of <code>Token</code> in\
    \ the header.</li>\n<li>Supporting more file types for uploaded files (except for invoices)</li>\n<li>Fixed that all multi\
    \ and single selection custom fields can now have a comma in their options</li>\n<li>Fixed that larger files (more than\
    \ 5MB) can be uploaded for custom fields</li>\n<li>Changed that the mass action and bulk endpoints are not async anymore\
    \ since it can cause problems on the users side</li>\n<li>Changed that custom fields with <code>settings_type=r</code>\
    \ allow one empty date</li>\n<li>Improved some error messages</li>\n</ul>\n<h2>Documentation:</h2>\n<ul>\n<li>Made the\
    \ documentation publicly accessible</li>\n<li>Fixed a bug in the \"Authentication\" section where the tag 'YOUR-API-KEY'\
    \ was missing</li>\n<li>Added a description for the limit query parameter</li>\n<li>Fixed that the <code>custom-fields</code>\
    \ of the <code>member</code> endpoint get their correct description</li>\n<li>Added the <code>reset-password</code> and\
    \ <code>get-token</code> endpoints to the documentation</li>\n<li>Changed the description of the <code>Authentication</code>\
    \ section to use Bearer</li>\n<li>Mentioning the inoffical python library</li>\n</ul>\n</div>\n\n"
