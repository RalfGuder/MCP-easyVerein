  /api/v1.7/get-token:
    post:
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  summary: The username or email address of the user to authenticate
                  description: The username or email address of the user that is also used to log in
                  required: true
                password:
                  type: string
                  summary: The password of the user
                  description: The password of the user to authenticate
                  required: true
                2FA:
                  type: string
                  summary: The two factor authentication token
                  description: The two factor authentication token (only required if the user trying to login has 2fa enabled)
                  required: false
      tags:
      - get-token
      description: 'Getting the token for the user to authenticate himself to use the api. This endpoint needs the login data
        of the user. Please consider, that `username` is build like this: `$orgShort_$emailOrUsername`. So if your orgshort
        is for example "abc" and your username is "some@example.de" the username string to use for authentication is `abc_some@example.de`.'
      summary: Get the token for a user to authenticate
      produces:
      - application/json
      responses:
        '200':
          description: If "needs2FA" in the response body is true it is required, otherwise the response body contains the
            token
        '400':
          description: The login credentials are not valid
  /api/v1.7/reset-password:
    post:
      parameters: []
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  summary: The email address to send the password reset email
                  description: The email address to send the password reset email
                  required: true
                short:
                  type: string
                  summary: The short of the organisation
                  description: The short of the organisation
                  required: true
      tags:
      - reset-password
      description: Triggering the password reset mechanism by sending out a password-reset email to the given email address
      summary: Triggering the password reset mechanism
      produces:
      - application/json
      responses:
        '204':
          description: The reset password email was send successfully
        '400':
          description: One of the required fields is missing or the email does not match any user
