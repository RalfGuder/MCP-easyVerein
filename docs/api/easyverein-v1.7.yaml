          description: The authentification token is not permitted or was not transmitted
          headers:
            Authorization:
              type: string
              description: Bearer <YOUR-API-KEY>
        '403':
          description: The transaction was refused (missing permission)
        '500':
          description: Something went wrong on the server side (should not happen)
        '200':
          description: The transaction was successful
      parameters:
      - name: pk
        in: path
        summary: The {pk} in the url
        description: The primary key (id) of the entry
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        description: The body containing the properties that can be changed/set
        content:
          application/json:
            schema:
              type: object
              properties:
                org:
                  type: string
                  summary: The org desync (must be a child organization)
                  description: A reference to the org to desync the users
                  example: '2457'
                customFilter:
                  type: integer
                  summary: The ID of the custom filter either as string or integer
                  description: The id of the custom filter to apply on the members. Either this must be defined or useSessionFilter
                    or users
                useSessionFilter:
                  type: boolean
                  summary: Using the session filter
                  description: Using the session filter to filter the members. Either this must be defined or customFilter
                    or users
                users:
                  type: array
                  summary: List of ids of users
                  description: Using this list of ids of users (members). Either this must be defined or customFilter or users
                startDate:
                  type: string
                  summary: YYYY-mm-dd
                  description: The date on which the user joins the sub org
                  example: '2026-04-10T15:14:04'
                endDate:
                  type: string
                  summary: YYYY-mm-dd
                  description: Optional, the date on which the user leaves the sub org (will be removed on this date automatically)
                  example: '2026-05-10T15:14:04'
      security:
      - bearerAuth:
        - write:all
        - read:all
