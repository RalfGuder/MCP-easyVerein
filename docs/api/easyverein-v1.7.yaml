                  summary: Maximalanzahl Der Teilnehmer
                  description: 'Zahlenwert; Maximalanzahl Der Teilnehmer Einer Veranstaltung; Standardwert: 0'
                startParticipation:
                  type: string
                  summary: Starttermin Für Die Teilnahme
                  description: Zeit Und Datumswert; Datum Und Uhrzeit Des Startes Des Anmeldungszeitraums
                  example: '2026-04-10T15:14:04'
                endParticipation:
                  type: string
                  summary: Endtermin Für Die Teilnahme
                  description: Zeit Und Datumswert; Datum Und Uhrzeit Des Endes Des Anmeldungszeitraums
                  example: '2026-04-10T15:14:04'
                access:
                  type: integer
                  summary: Zugang
                  description: 'Zahlenwert; Repräsentation Des Zugangsstatuses In Form Einer Zahl; Standardwert: 0; Zusatz:
                    Möglich Ist: 0 -> Sperren, 1 -> Erlauben, 2 -> Mit Begleitperson, 3-> Ohne Preisgruppe'
                note:
                  type: string
                  summary: Prolog
                  description: 'Zeichenwert; Speichert Den Inhalt Eines Eventuellen, Internen Prologs Für Eine Veranstaltung;
                    Zusatz: Der Prolog Ist Für Den Auszug'
                start:
                  type: string
                  summary: Starttermin
                  description: Zeit Und Datumswert; Datum Und Uhrzeit Des Startes Einer Veranstaltung
                  example: '2026-04-10T15:14:04'
                end:
                  type: string
                  summary: Endtermin
                  description: Zeit Und Datumswert; Datum Und Uhrzeit Des Endes Einer Veranstaltung
                  example: '2026-04-10T15:14:04'
                allDay:
                  type: boolean
                  summary: Geht Die Veranstaltung Den Ganzen Tag?
                  description: 'Boolscher Wert; Veranstaltung Dauert Den Ganzen Tag; Standardwert: False'
                weekdays:
                  type: string
                  summary: Wochentage
                  description: Zeichenwert; Wochentage An Denen Die Veranstaltung Statt Findet; Maximal 100 Zeichen
                confirmationToAddresses:
                  type: array
                  summary: Emailbenachrichtigungen
                  description: Referenzewert; Referenz Auf Die Adressen Welche Eine Email Benachrichtung Bekommen Sollen Wenn
                    Eine Teilnahme Hinzugefügt Wird;
                  items:
                    type: integer
                sendMailCheck:
                  type: boolean
                  summary: Emailbenachrichtigung Für Den Verein
                  description: 'Boolscher Wert; Email Benachrichtigung Aktivieren Bei Neuen Teilnahmen Zu Diesem Termin Für
                    Den Verein; Standardwert: False'
                showMemberarea:
                  type: boolean
                  summary: Soll Der Mitgliedsbereich Gezeigt Werden?
                  description: 'Boolscher Wert; Mitgliedsbereich Zeigen; Standardwert: False'
                isPublic:
                  type: boolean
                  summary: Termin Für Externe Sichtbar
                  description: 'Boolscher Wert; Termin Für Externe Sichtbar; Standardwert: False'
                massParticipations:
                  type: boolean
                  summary: Gesammelte Anmeldungen Für Folgetermine Erlauben
                  description: 'Boolscher Wert; Gesammelte Anmeldungen Für Folgetermine Erlauben; Standardwert: False'
                canceled:
