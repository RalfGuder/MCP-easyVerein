    \ <code>returnDate</code>, <code>borrowingDate</code>, <code>quantity</code></li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"\
    new\">New</span>] article-object:</h4>\n<ul>\n<li>ALL: Added the new endpoint for article objects used for invoices</li>\n\
    <li>ALL: Added the new field <code>sphere</code> to this endpoint</li>\n<li>PATCH: Fixed that <code>additional</code>\
    \ is only validated when it is given</li>\n<li>POST: Made the <code>identifier</code> optional, setting its value automatically\
    \ if it is not set</li>\n<li>GET/POST/PATCH: Added the field <code>billingAccount</code> to this endpoint</li>\n<li>ALL:\
    \ Chairmen with inventory permissions can create/change entries</li>\n<li>GET/POST/PATCH: [<strong><span id=\"breaking\"\
    >breaking</span></strong>] Renamed the fields <code>earningAbsolute</code> and <code>earningPercent</code> to <code>profit_margin_per_unit</code>\n\
    \  and <code>profit_margin_per_unit_in_percent</code>. Both fields are now read only.</li>\n<li>GET: [<strong><span id=\"\
    breaking\">breaking</span></strong>] The read only field <code>availablePieces</code> will now return <code>-1</code>\
    \ instead of the string \"unbegrenzt\"\n  when there is no limit</li>\n</ul>\n</li>\n<li>\n<h4>custom-field:</h4>\n<ul>\n\
    <li>GET: Normal users can now see the <code>collection</code> cross-connection from a customfield entry.</li>\n<li>ALL:\
    \ Added the new field <code>sphere</code> to this endpoint</li>\n<li>POST/PATCH: The <code>name</code> of a customfield\
    \ must be unique</li>\n<li>GET/PATCH/POST: [<strong><span id=\"breaking\">breaking</span></strong>] Added a new endpoint\
    \ <code>custom-field/$id/select-options</code> representing options for select fields (custom fields with <code>settings_type</code>\
    \ <code>a</code> and <code>s</code>). For these fields <code>selectOptions</code> replaces the <code>additional</code>\
    \ attribute</li>\n</ul>\n</li>\n<li>\n<h4>booking:</h4>\n<ul>\n<li>POST/PATCH: Changed that <code>bookingProject</code>\
    \ must not be completed to link it to a booking</li>\n<li>ALL: Added the new field <code>sphere</code> to this endpoint</li>\n\
    <li>POST/PATCH: Considering the <code>bookkeepingStandardFormOfAccountsEnabled</code> setting now</li>\n<li>PATCH/DELETE:\
    \ Considering the <code>bookkeepingLockCommitDate</code> setting now</li>\n<li>POST/PATCH: Log booking project and bank\
    \ account assignment changes in the changelog</li>\n<li>POST/PATCH: <code>relatedInvoice</code> needs to be invoices that\
    \ have \"invoice\" as <code>mode</code> and cannot have <code>isDraft</code>, <code>isTemplate</code> or <code>isRequest</code>\
    \ set to True</li>\n</ul>\n</li>\n<li>\n<h4>booking-project:</h4>\n<ul>\n<li>POST/PATCH: Changed that <code>short</code>\
    \ must be unique</li>\n<li>PATCH/DELETE: Enabled the wastebasket restoring/deleting</li>\n<li>GET: Searching for <code>short</code>\
    \ and <code>name</code> is now possible</li>\n<li>POST/PATCH: <code>subOrg</code> can not be set for demo organizations</li>\n\
    </ul>\n</li>\n<li>\n<h4>bank-account:</h4>\n<ul>\n<li>POST/PATCH: Changed that <code>short</code> must be unique</li>\n\
    <li>ALL: Added the new field <code>sphere</code> to this endpoint</li>\n<li>PATCH/DELETE: Enabled the wastebasket restoring/deleting</li>\n\
    <li>POST/PATCH: Changed the max length from <code>BIC</code> to 11</li>\n<li>ALL: Added the new field <code>last_imported_date</code>\
    \ to this endpoint</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] check-discount-code:</h4>\n<ul>\n<li>POST:\
    \ Added the new endpoint to check if the given discount-code is valid or not</li>\n<li>POST: Added the field <code>discount</code>\
    \ to the response to inform about the discount in percent</li>\n</ul>\n</li>\n<li>\n<h4>invoice:</h4>\n<ul>\n<li>GET:\
    \ Fixed that <code>charges</code> will no longer hit the database more times than needed, causing a little overhead</li>\n\
    <li>PATCH: Fixed the wastebasket restoring</li>\n<li>POST: Preventing the user from canceling a cancellation-invoice</li>\n\
    <li>ALL: Add fields <code>creationDateForRecurringInvoices</code> and <code>recurringInvoicesInterval</code></li>\n<li>PATCH:\
    \ Fixed a bug where <code>relatedAddress</code> was not valid when the requesting chairman had no permissions to see the\
    \ ALREADY set <code>relatedAddress</code></li>\n<li>GET: Fixed the paymentDifference-condition in <code>_isOpenForBookingFilter</code></li>\n\
    <li>GET/PATCH: Considering the <code>memberAreaShowInvoices</code> setting for members</li>\n<li>PATCH/DELETE: Considering\
    \ the <code>bookkeepingLockCommitDate</code> setting now</li>\n<li>GET: Made the counter-field from <code>canceledInvoice</code>\
    \ visible named <code>cancelInvoice</code> which points to the invoice that is canceling it</li>\n<li>GET/POST/PATCH:\
    \ Added new field <code>customPaymentMethod</code></li>\n<li>POST: Fixed a crash when posting <code>isReceipt=True</code>\
    \ and no <code>relatedAddress</code> with a organization token</li>\n<li>POST: Fixed a crash when posting <code>isRequest=True</code>\
    \ and <code>receiver</code> is set and no <code>relatedAddress</code> is set with a organization token</li>\n<li>GET:\
    \ Add <code>ne</code> filter option for <code>kind</code> field</li>\n<li>GET/PATCH/POST: Added new field <code>isReceipt</code></li>\n\
    <li>PATCH/POST: Made field <code>invoiceItems</code> required for any invoice that is not a draft (<code>isDraft</code>),\
    \ a template (<code>isTemplate</code>) or a request (<code>isRequest</code>)</li>\n<li>DELETE: Invoices that are not deletable\
    \ cannot be deleted anymore</li>\n<li>GET/POST/PATCH: Added new fields <code>_isTaxRatePerInvoiceItem</code> and <code>_isSubjectToTax</code></li>\n\
    <li>GET/POST/PATCH: Added new field <code>closingDescription</code></li>\n<li>GET: Searching for <code>date</code> is\
    \ now possible</li>\n<li>POST/PATCH: <code>relatedBookings</code> and <code>canceledInvoice</code> can only be set when\
    \ <code>mode</code> is \"invoice\"</li>\n<li>GET/POST/PATCH: Added the new field <code>useAddressBalance</code> that determine\
    \ if possible credit balances should be included in the calculation</li>\n<li>GET/POST/PATCH: Added the new field <code>participationPriceGroups</code>\
    \ that links the invoice to multiple entries of the\n  <code>participation-price-group</code> endpoint</li>\n<li>ALL:\
    \ Fix issue that invoice of mode <code>offer_template</code> could not be save without any positions.</li>\n</ul>\n</li>\n\
    <li>\n<h4>invoice-item:</h4>\n</li>\n<li>\n<p>GET/POST/PATCH: [<strong><span id=\"breaking\">breaking</span></strong>]\
    \ Renamed the field <code>article</code> to <code>articleObject</code></p>\n</li>\n<li>\n<h4>invoice-item:</h4>\n<ul>\n\
    <li>POST/PATCH: The field <code>title</code> does not allow None as value anymore and the max_length of <code>title</code>\
    \ is increased from 200 to 300</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] payment-method:</h4>\n<ul>\n\
    <li>ALL: Added the new endpoint for methods of payment used for invoices and addresses</li>\n<li>POST: Fixed a bug where\
    \ <code>payedFromUser</code> was not set when the requesting user is a chairman and the field is not set in the request</li>\n\
    <li>PATCH: The relatedAddress will not be set automatically when <code>isTemplate=True</code></li>\n</ul>\n</li>\n<li>\n\
    <h4>[<span id=\"new\">New</span>] cancellation:</h4>\n<ul>\n<li>POST: It is now possible to make a cancellation even as\
    \ not authenticated user</li>\n</ul>\n</li>\n<li>\n<h4>task:</h4>\n<ul>\n<li>POST: <code>starttime</code> and <code>endtime</code>\
    \ are no longer mandatory when <code>parentEvent</code> is given</li>\n<li>PATCH: Fixed that <code>name</code> is no longer\
    \ required for patches</li>\n<li>PATCH: Fixed the wastebasket restoring</li>\n<li>PATCH/POST: Log calendar assignment\
    \ changes in the changelog</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] community-function-feedback:</h4>\n\
    <ul>\n<li>POST/GET/DELETE: Added a new endpoint to send feedback for certain functions in easyVerein</li>\n</ul>\n</li>\n\
    <li>\n<h4>forum:</h4>\n<ul>\n<li>ALL: Chairmen now need the <code>forum</code> module permissions for this endpoint</li>\n\
    <li>GET/PATCH/POST: Added the new field <code>order</code> to make forums sortable for an organization</li>\n<li>GET:\
    \ Made the endpoint faster</li>\n</ul>\n</li>\n<li>\n<h4>topic:</h4>\n<ul>\n<li>ALL: Chairmen now need the <code>forum</code>\
    \ module permissions for this endpoint</li>\n<li>POST: Subscribers of a forum will now get email notifications when a\
    \ new topic is created</li>\n<li>GET: Added the filter <code>subscribed</code> to show only the topics that the requesting\
    \ user is subscribed to</li>\n<li>POST/PATCH: Fixed that chairmen can change their own <code>type</code> and other fields\
    \ that chairmen are allowed to change</li>\n<li>GET: Made the endpoint faster</li>\n<li>GET: Fixed a bug where posts could\
    \ occur more than once in the response and where requesting a single topic caused an error</li>\n<li>GET: Incrementing\
    \ the <code>views_count</code> of a topic on retrieve</li>\n<li>GET: <span id=\"new\">New</span> action <code>report</code>\
    \ returns the <code>reportUrl</code> which can be used to report the given topic.</li>\n</ul>\n</li>\n<li>\n<h4>post:</h4>\n\
    <ul>\n<li>ALL: Chairmen now need the <code>forum</code> module permissions for this endpoint</li>\n<li>POST: Subscribers\
    \ of a topic will new get email notifications when a new post is created</li>\n<li>PATCH: <code>updates_count</code> now\
    \ gets incremented by the API</li>\n<li>GET: Removed some fields from the endpoint: <code>anonymous_key</code>, <code>update_reason</code>,\
    \ <code>updated_by</code>, <code>username</code>, <code>enable_signature</code></li>\n<li>GET: Made the endpoint faster</li>\n\
    <li>GET: Fixed a bug where posts could occur more than once in the response</li>\n<li>GET: <span id=\"new\">New</span>\
    \ action <code>report</code> returns the <code>reportUrl</code> which can be used to report the given post.</li>\n</ul>\n\
    </li>\n<li>\n<h4>billing-account:</h4>\n<ul>\n<li>ALL: Added the new field <code>defaultSphere</code> to this endpoint</li>\n\
    </ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] application-form:</h4>\n<ul>\n<li>ALL: Implemented the application\
    \ forms in the API</li>\n<li>GET/PATCH/POST: Added the new field <code>confirmButtonText</code> that contains the text\
    \ for the confirm button for the application</li>\n<li>GET: Added new filter <code>showOwn</code> to filter only forms\
    \ beloging to one's own organization</li>\n<li>GET/PATCH/DELETE: Enabled the wastebasket for this endpoint</li>\n</ul>\n\
    </li>\n<li>\n<h4>[<span id=\"new\">New</span>] application-form-element:</h4>\n<ul>\n<li>ALL: Implemented the application\
    \ forms in the API, application form elements are the individual fields that can be filled</li>\n<li>POST/PATCH: Enabled\
    \ this endpoint for <code>bulk-update</code> and <code>bulk-create</code></li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\"\
    >New</span>] apply:</h4>\n<ul>\n<li>POST: Implemented the new apply endpoint to enable external (anonymous) users to register\
    \ to an organization. This endpoint needs a reference to a <code>applicationForm</code> and will require all mandatory\
    \ fields of the applicationForm and only allows fields that are in the applicationForm</li>\n</ul>\n</li>\n<li>\n<h4>[<span\
    \ id=\"new\">New</span>] lsb-sport:</h4>\n<ul>\n<li>ALL: Added the new endpoint for lsb-sports</li>\n</ul>\n</li>\n<li>\n\
    <h4>statistics:</h4>\n<ul>\n<li>GET: Made the endpoint smart and respect the <code>query</code> parameter to save performance</li>\n\
    </ul>\n</li>\n<li>\n<h4>feature-request:</h4>\n<ul>\n<li>GET: Drastically improved the performance for simple get requests</li>\n\
    <li>GET: The <code>status</code> of a feature request will now change automatically to <code>1</code> (\"In Pruefung\"\
    ) when the score of the request reaches 50+</li>\n</ul>\n</li>\n<li>\n<h4>get-token:</h4>\n<ul>\n<li>GET: Fixed broken\
    \ login log status</li>\n</ul>\n</li>\n<li>\n<h4>price-group:</h4>\n<pre><code>- GET/POST/PATCH: [**<span id=\"breaking\"\
    >breaking</span>**] Renamed the field `copiedFrom` to `original`\n- GET/POST/PATCH: [**<span id=\"breaking\">breaking</span>**]\
    \ Renamed the field `price` to `sellingPrice`\n- GET: Added the new read only field `availablePieces`\n- GET/POST/PATCH:\
    \ Added the new fields `billingAccount`, `hasUnlimitedPieces`, `pieces`, `reservedPieces`,\n  `taxRate`, `taxName`, `custCentre`,\
    \ `sphere`, `gross` and `maximumPiecesPerParticipation`\n- POST: Added a new action `generate-invoices` to generate invoices\
    \ for all participation price groups related to a\n  price group\n- GET: [**<span id=\"breaking\">breaking</span>**] The\
    \ read only field `availablePieces` will now return `-1` instead of the string \"unbegrenzt\"\n  when there is no limit\n\
    - POST: Added a new action `generate-invoices` to generate invoices for all participation price groups related to a\n\
    \  price group\n- GET: Normal members can now also see the field `maximumPiecesPerParticipation`\n</code></pre>\n</li>\n\
    <li>\n<h4>[<span id=\"new\">New</span>] participation-price-group:</h4>\n</li>\n<li>ALL: Added the new endpoint participation-price-group.\
    \ This endpoint links multiple participations to multiple price\n  groups.</li>\n</ul>\n<h2>All endpoints:</h2>\n<pre><code>-\
    \ ALL: All endpoints except for `get-token`, `refresh-token` and `statistics` can only be used, using the new expiring\
    \ tokens\n- GET: Fixed a prefetch error causing the API to produce a overhead on certain queries\n- GET/PATCH: Enabled\
    \ the wastebasket for every endpoint that has the `_deleteAfterDate` and `_deletedBy` attributes\n- GET: Removed the `verbose_names`\
    \ and `descriptions` from each endpoint since it is bloat. Every normal endpoint now has a `descriptions` action to obtain\
    \ this information\n- GET: [**<span id=\"breaking\">breaking</span>**] Hiding the `count` parameter by default improving\
    \ the performance on large organizations with large query results significantly. Adding the parameter `showCount=true`\
    \ to the request will include this parameter again in the response\n- GET: Fixed a rare edgecase where for example `{*,contactDetails{customFields{*}}}`\
    \ would crash the API. The same key can now be considered in the same query multible times\n- GET: Fixed negative queries\n\
    </code></pre>\n<h2>Generic:</h2>\n<pre><code>- Changed that mass actions can now handle a new given attribute: `ids` instead\
    \ of filters. This makes it possible to select the entries to change by hand\n- It is no longer possible to referer to\
    \ an entry in the wastebasket\n- The system treats `get-token` logins now like web logins\n- Logins with QR Codes are\
    \ now logged correctly.\n- POST: Fixed that chairmen with only read permissions on members/addresses can set the corresponding\
    \ entries again\n- Changed that mass actions affect all datasets when no filter is set\n</code></pre>\n<h2>Documentation:</h2>\n\
    <pre><code>- Describing the new token authentication\n- Improved the description of the `get-token` Endpoint\n- Fixed\
    \ a rare bug occurring when the first customfield of a requesting user is a multiline customfield\n- Added a body for\
    \ the `session-filter` documentation\n- Fixed the documentation description for `custom-fields` sub endpoints\n</code></pre>\n\
    </div>\n\n</div>\n</details>\n<br><br><br>\n<h2>Available API endpoints</h2>\n<p>\n\tBrowse all available endpoints below.\
    \ Click <b>Authorize</b> and enter your API token\n\tto authenticate. Your token will be applied\n\tto all requests made\
    \ from this page.\n\tTo send a request, open an endpoint and click <b>Try it out</b>.\n</p>\n<p>\n\t<b id=\"tryItOutWarning\"\
    >Warning:</b> Requests executed via <b>Try it out</b> are real API calls against your live organization data.\n\tAny changes\
    \ you make — including creating, updating or deleting records — will take effect immediately.\n</p>\n"
