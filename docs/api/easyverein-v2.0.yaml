openapi: 3.0.0
info:
  title: easyVerein REST-API documentation
  version: v2.0
  defaultVersion: v2.0
  host: https://easyverein.com/api/v2.0
  description: "\n\n<h3>This version is the stable version, you can use the alias <code>stable</code></h3>\n\n<br><br>\n<details>\n\
    <summary>General overview</summary>\n<div id=\"summaryBodyGenerealOverview\">\n<p>This API provides you with access to\
    \ data and routines of the easyVerein software and allows you to integrate easyVerein into other tools and services.\n\
    You may access and update information stored in easyVerein using this API or invoke procedures of this software.\nYou\
    \ may use this API to build your custom workflows, exchange data with tools or extend the functionality of the software.\n\
    </p>\n<h3 id=\"rateLimitHeading\">Rate limit</h3>\n<p id=\"rateLimitText\">\nRequests are limited to 100/min.\n</p>\n\
    <h3>Responsibility</h3>\n<p>Please read the instructions carefully.\nBe aware that we cannot take any responsibility when\
    \ you alter, disclose or delete any data unintentionally.\nAny API call authenticated with your API token is taken as\
    \ a data processing instruction of your organization.\n§3 and §4 of our data processing agreement (AVV) also applies to\
    \  instructions given by using the API.\nThis also applies when you call API endpoints by using scripts, third-party applications,\
    \ external tools or other software solutions.</p>\n<h3>Support</h3>\n<p>Please note that our customer support team cannot\
    \ provide you with support for our API services.\nIf you have questions regarding this API that are not covered by our\
    \ documentation our support team may forward your request to our technical team but please be aware that it might take\
    \ longer than usual to get a response.\nOur technical team cannot check or verify your implementations and scripts.\n\
    We cannot provide you with support for custom software or third-party applications.</p>\n<h3 id=\"auth\">Authentication</h3>\n\
    <p>To use this API you need to transfer a token for every request within the header. To do so you need to set a header\
    \ variable like this: <code>'Authorization': 'Bearer &lt;YOUR-API-KEY&gt;'</code>.</p>\n\n<p><b>Since v2.0 the tokens\
    \ are valid for 30 days. 15 days after the creation/refresh of a token the token should be refreshed (replaced by a new\
    \ one) using the <code>refresh-token</code> endpoint</b></p>\n<p>The API will inform you that your token needs to be refreshed\
    \ by setting the <code>tokenRefreshNeeded</code> attribute in every header of every response.\nA simple GET request on\
    \ the <code>refresh-token</code> endpoint will give you a new token that replaces the old token immediately. v2.0 will\
    \ enforce the use of this token.</p>\n\n<h3>Applications</h3>\n<p>An application is also a normal member but with the\
    \ <code>_isApplication</code> flag set to <code>true</code>. To make a new application we strongly recommend to send the\
    \ applications data to\nyour backend and send them from there to the API using the token of the organization. We also\
    \ recommend the use of any spam prevention like the reCaptcha.</p>\n<h3>Good to know</h3>\n<p>The member- and the contact-details-\
    \ table needs each other, if you plan to create a user, please do it like this:\nFirst create a contact-details (POST\
    \ to the contact-details endpoint) and enter at least all required fields.\nThe fields that are required depends on the\
    \ <code>'_isCompany'</code> attribute. If it is set to \"true\", <code>'companyName'</code> is the only field you\nhave\
    \ to define. If it is set to \"false\" (which is the default), you need to define at least the <code>'firstName'</code>\
    \ and the <code>'familyName'</code>.\nAfter you have successfully created the contact details, you can create a member.\n\
    The required fields for the member are: <code>'emailOrUserName'</code> and <code>'contactDetails'</code>.\nIf you set\
    \ <code>'_isApplication'</code> to \"true\" you automatically create a membership application which can be manually reviewed\
    \ within the software. We recommend to do so if you build your own application form.\nPlease note: The relationship of\
    \ contactDetails to member is a composition, the member requires the contactDetails, the contactDetails can exist without\
    \ a member.</p>\n<p>You can reference to the contact-details-endpoint (and any other relation) in three ways:</p>\n<ol>\n\
    \t<li>With a string, containing the http-reference like the API shows the relation (for example <code>https://easyverein.com/api/v2.0/contact-details/{pk}</code>)</li>\n\
    \t<li>With a string, containing the primary key (pk) of the reference</li>\n\t<li>With an integer as the primary key (pk)\
    \ of the reference</li>\n</ol>\n<p><b>It is highly recommended</b> to use the <code>?query</code> term if possible. The\
    \ API will optimize the performance depending on the queried data. So please consider that the API can be faster if you\
    \ limit the fields to get.</p>\n<p>It is also possible to define the amount of entries to view per page using the <code>?limit</code>\
    \ term. The default value of it is 5 and the maximum value is 100</p>\n<h4>What about this bulk-endpoints?</h4>\n<p>The\
    \ <code>bulk-update</code> and <code>bulk-create</code> endpoints can include multiple requests for the same endpoint.\
    \ It is possible to use these endpoints to create or change a big amount of entries in just one single request.</p>\n\
    <p>This is much more time saving and even energy efficient than doing a single request per entry.</p>\n<p><strong>We recommend</strong>\
    \ to use these endpoints when possible to improve performance, saving energy and time.</p>\n<h4>Why doesn't each endpoint\
    \ have a bulk endpoint?</h4>\n<p>It is theoretically possible to activate this for every endpoint. For now the bulks are\
    \ just active for:<code>member</code>,<code>contact-details</code>,<code>invoice</code>,<code>event</code>,<code>booking</code>,<code>lending</code>,<code>application-form-element</code>,<code>organization-token</code>,<code>participation-price-group</code>,<code>^member/(?P&lt;userPk&gt;(\\\
    d+))/groups</code>,<code>^member/(?P&lt;userPk&gt;(\\d+))/custom-fields</code>,<code>^contact-details/(?P&lt;contactDetailsPk&gt;(\\\
    d+))/custom-fields</code>,<code>^event/(?P&lt;eventPk&gt;(\\d+))/custom-fields</code>,<code>^inventory-object/(?P&lt;inventoryObjectPk&gt;(\\\
    d+))/custom-fields</code>,<code>^custom-field/(?P&lt;customFieldPk&gt;(\\d+))/select-options</code>,<code>participation</code>,</p>\n\
    <p>We just think that the bulk actions are not usefully for every endpoint.</p>\n<h4>How to upload a file? (e.g. <code>_profilePicture</code>)</h4>\n\
    <p>Uploading a file isn't possible for POST requests. It is possible to PATCH files though. Uploading with a PATCH just\
    \ works like a normal PATCH but with a special header set:</p>\n<code>'Content-Disposition': 'attachment; name=\"samplename\"\
    ; filename=\"samplepicture.jpg\"'</code>\n<p>The body of the PATCH includes the key of the field to upload the file for\
    \ (e.g. <code>_profilePicture</code>) and a byte stream as value.</p>\n</div>\n</details>\n<details>\n<summary>Samples</summary>\n\
    <div id=\"summaryBodySamples\">\n<p>For further examples on how this API works, please take a look on our <a rel=\"noreferrer\"\
    \ href=\"https://github.com/SD-Software-Design-GmbH/easyVerein-API-Samples\">REST-API-Samples</a> hosted on GitLab.</p>\n\
    <p>There is also an inofficial <a rel=\"noreferrer\" href=\"https://github.com/Fensterbank/easyverein\">Node.js library</a>\
    \ and some actively developed projects (for example a <a rel=\"noreferrer\" href=\"https://github.com/egtofficial/egt-vereinsbot\"\
    >Discord Bot</a> and a custom <a rel=\"noreferrer\" href=\"https://github.com/egtofficial/egt-payment\">payment page</a>)\
    \ on GitHub! Thanks to <a rel=\"noreferrer\" href=\"https://github.com/Fensterbank\">Fensterbank</a> for sharing his implementations!</p>\n\
    <p>The API has also an unofficial (community) <a rel=\"noreferrer\" href=\"https://github.com/waza-ari/python-easyverein\"\
    >python library</a> now!</p>\n<br>\n<p>A good sample for a get request with nested query:</p>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v2.0/member?query=&lcub;id,contactDetails&lcub;id,name&rcub;,org&lcub;id,name,short&rcub;,emailOrUserName,membershipNumber&rcub;</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"membershipNumber\": \"<span id=\"firstRequestMembershipNumber\"></span>\"\
    ,\n\t\t\t\"org\": {\n\t\t\t\t\"id\": <span id=\"firstRequestOrgId\"></span>,\n\t\t\t\t\"short\": \"<span id=\"firstRequestOrgShort\"\
    ></span>\",\n\t\t\t\t\"name\": \"<span id=\"firstRequestOrgName\"></span>\"\n\t\t\t},\n\t\t\t\"id\": <span id=\"firstRequestId\"\
    ></span>,\n\t\t\t\"contactDetails\": {\n\t\t\t\t\"id\": <span id=\"firstRequestContactDetailsId\"></span>,\n\t\t\t\t\"\
    name\": \"<span id=\"firstRequestContactDetailsName\"></span>\"\n\t\t\t},\n\t\t\t\"emailOrUserName\": \"<span id=\"firstRequestEmailOfUserName\"\
    ></span>\"\n\t\t}\n\t</code>\n</pre>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v2.0/contact-details?query=&lcub;id,customFields&lcub;addressObject&lcub;customFields&lcub;addressObject&lcub;id&rcub;&rcub;&rcub;&rcub;&rcub;</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"id\": <span id=\"secondRequestId\"></span>,\n\t\t\t\"customFields\"\
    : [{\n\t\t\t\t\"addressObject\": {\n\t\t\t\t\t\"customFields\": \"https://easyverein.com/api/v2.0/contact-details/<span\
    \ id=\"secondRequestLinkId\"></span>/custom-fields/\"\n\t\t\t\t}\n\t\t\t}]\n\t\t}\n\t</code>\n</pre>\n<p>There is a recursion\
    \ limit for the API to prevent the same entry from being retrieved again in a request.</p>\n<p>Request:</p>\n<p><code>https://easyverein.com/api/v2.0/member?query=&lcub;id,customFields&lcub;-org,-userObject,-_deleteAfterDate,-_deletedBy&rcub;&rcub;</code></p>\n\
    <p>Response:</p>\n<pre>\n\t<code>\n\t\t{\n\t\t\t\"id\": <span id=\"thirdRequestId\"></span>,\n\t\t\t\"customFields\":\
    \ [{\n\t\t\t\t\"id\": <span id=\"thirdRequestCustomFieldId\"></span>,\n\t\t\t\t\"customField\": \"https://easyverein.com/api/v2.0/custom-field/<span\
    \ id=\"thirdRequestLinkId\"></span>\",\n\t\t\t\t\"value\": \"<span id=\"thirdRequestValue\"></span>\"\n\t\t\t}]\n\t\t\
    }\n\t</code>\n</pre>\n<p>\n\tIt is also possible to define a negative query to exclude some fields from a response, this\
    \ can be helpfully if a request needs most of the fields but does not need all.\n\tThis is made possible by putting a\
    \ '-' in front of the field: <code>?query={-$field}</code>\n</p>\n</div>\n</details>\n<details>\n<summary>Changelog</summary>\n\
    <div id=\"summaryBodyChangelog\">\n\n<div id=\"scrollable\">\n<h2>Endpoints:</h2>\n<ul>\n<li>\n<h3>normalize:</h3>\n<ul>\n\
    <li>POST: Added normalization support for the <code>debitName</code> field (SEPA-compliant formatting).</li>\n</ul>\n\
    </li>\n<li>\n<h4>location:</h4>\n<ul>\n<li>ALL: Three new optional fields are available: <code>zip</code>, <code>state</code>,\
    \ <code>country</code>. It is not recommended to save the zip in the city field anymore.</li>\n<li>PATCH: The <code>longlat</code>\
    \ attribute gets updated when updating the location</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] chat-settings</h4>\n\
    <ul>\n<li>GET/PATCH: The new chat-settings endpoint allows to update the users preferences for the chat feature.</li>\n\
    <li>ALL: <code>playSoundOn<span id=\"new\">New</span>Message</code> can now be modified</li>\n</ul>\n</li>\n<li>\n<h4>[<span\
    \ id=\"new\">New</span>] chat-actions</h4>\n<ul>\n<li>GET: This endpoint is used for pre-Matrix preparations of clients.</li>\n\
    </ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] oauth2-application:</h4>\n<ul>\n<li>ALL: The new endpoint allows\
    \ to setup OAuth2 applications.</li>\n<li>GET: Applications now contain the read-only field <code>public</code>.</li>\n\
    </ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>] oauth2-custom-claim:</h4>\n<ul>\n<li>ALL: Setup the new custom claims\
    \ which allow applications to access specific custom fields of the user</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\"\
    >New</span>] oauth-credentials:</h4>\n<ul>\n<li>GET/PATCH: <code>oauthcredentials</code> are now available to get by their\
    \ <code>id</code> and their <code>details</code> field is updatable.</li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\">New</span>]\
    \ smtp-email-setting:</h4>\n<ul>\n<li>ALL: added SmtpEmailSetting used to define from which smtp email profile mails should\
    \ be sent from (formerly saved directly on the user). One OrgUser can have up to three SmtpEmailSettings.</li>\n<li>GET:\
    \ The field <code>gmailoauthcredentials</code> is now called <code>oauthcredentials</code></li>\n<li>PATCH: <span id=\"\
    new\">New</span> action to set the password: <code>update-password</code></li>\n</ul>\n</li>\n<li>\n<h4>[<span id=\"new\"\
    >New</span>] anniversary-mailing:</h4>\n<ul>\n<li>ALL: Create, update and delete anniversary mailing objects which are\
    \ used to store information on what mails should be sent on which anniversaries (e.g. birthdays and jubilees)</li>\n</ul>\n\
    </li>\n<li>\n<h4>refresh-token</h4>\n<ul>\n<li>GET: The new field <code>expiresIn</code> tells you how long the refresh-token\
    \ is valid.</li>\n<li>GET: Removed the logging to avoid customer confusion</li>\n</ul>\n</li>\n<li>\n<h4>announcement:</h4>\n\
    <ul>\n<li>GET: [<strong><span id=\"breaking\">breaking</span></strong>] Renamed the attributes <code>publish</code> and\
    \ <code>depublish</code> to <code>start</code> and <code>end</code></li>\n</ul>\n</li>\n<li>\n<h4>get-token</h4>\n<ul>\n\
    <li>ALL: The successful response contains the field <code>expiresIn</code> to tell you how long the token is valid.</li>\n\
    </ul>\n</li>\n<li>\n<h4>organization:</h4>\n<ul>\n<li>PATCH: Changing the skr of all related billing accounts of the org\
    \ when <code>bookkeepingStandardFormOfAccounts</code> gets changed</li>\n<li>GET: Added <code>memberAreaListAllowPDFExport</code>\
    \ and <code>memberAreaListAllowCSVExport</code> to the fields for normal members</li>\n<li>PATCH: Changing <code>memberAreaMemberListColumns</code>\
    \ using the API is now possible</li>\n<li>PATCH: When debit functionality gets enabled the mail to the user now contains\
    \ the correct data</li>\n<li>GET: Made the field <code>eventNextDayThreshold</code> available for normal members</li>\n\
    <li>GET/PATCH: Added the new field <code>apiAnnouncementReceiverEmails</code> that contains all emails of the organization\
    \ to inform the organizations for bigger API changes</li>\n<li>GET/PATCH: added new fields for cloud saving  <code>storageEmailAttachments</code>,\
    \ <code>_integrationDropBoxEmailAttachmentsPath</code> and <code>storage_emailAttachments</code></li>\n<li>PATCH/GET:\
    \ Added a new attribute <code>defaultApplicationForm</code> to set a default application form</li>\n<li>PATCH/GET: Added\
    \ a new attribute <code>integrationAutomaticPasscreatorRemovalEnabled</code> to enable automatic removal of Passcreator\
    \ passes for members with expired membership</li>\n<li>GET: If the SMTP settings of the organization are changed, all\
    \ existing smtpEmailSettings will be invalidated.</li>\n<li>GET: Every member can now see <code>allowMemberCancellation</code></li>\n\
    <li>PATCH/GET: Added a new attribute <code>memberAreaAllowBankDataDebitMandateChanges</code> to allow bankdata changes\
    \ when <code>paymentMethod=1</code></li>\n<li>GET/PATCH: Added the new fields <code>_emailTextTemplateAddressApplicationConfirmation</code>\
    \ and <code>_emailTextTemplateAddressApplicationConfirmationSubject</code></li>\n<li>GET/PATCH: Added the new fields <code>sphereDunning</code>\
    \ and <code>invoiceMembershipFeeDefaultSphere</code> to this endpoint</li>\n<li>PATCH/GET: Added the new field <code>smtpAddToBCC</code>,\
    \ which requests all mails of the organization to also be sent to the inbox of the smtp profile.</li>\n<li>GET: Made the\
    \ field <code>bookkeepingCurrency</code> available for normal users</li>\n<li>PATCH: Every chairman can see and change\
    \ the <code>firstSteps</code> attribute of the organization</li>\n<li>PATCH: Organization names may no longer contain\
    \ backslashes</li>\n<li>GET/PATCH: Added a new setting: <code>require_debit_data_change_approval</code></li>\n<li>GET/PATCH:\
    \ Added the new field <code>keepEmailLogsWithNoLimit</code> to this endpoint</li>\n<li>GET/PATCH: Added the new fields\
    \ <code>keepChangeLogsWithNoLimit</code> and <code>keepLoginLogsWithNoLimit</code> to this endpoint</li>\n<li>PATCH: Fix\
    \ that when <code>bookkeepingElectronicDonationEnabled</code> is enabled all necessary fields related to electronic donations\
    \ (<code>bookkeepingDonationDateForSigning</code>, <code>bookkeepingDonationCityForSigning</code> and <code>bookkeepingDonationSigningImage</code>)\
    \ also have to be set.</li>\n<li>GET/PATCH: Added the new field <code>memberAreaCalendarHideDataProtection</code></li>\n\
    <li>GET: The integrationDropbox related settings now have an empty string as default values (they will get moved to the\
    \ organization-settings endpoint in the future)</li>\n<li>GET/PATCH: [<strong><span id=\"breaking\">breaking</span></strong>]\
    \ Removed <code>invoicePaymentInformationOther</code></li>\n<li>GET/PATCH: Changed the default value of all Dropbox path\
    \ related fields to empty strings. (<code>_integrationDropBoxMemberDocumentsPath</code>, <code>_integrationDropBoxLettersPath</code>,\
    \ <code>_integrationDropBoxProtocolsPath</code>, <code>_integrationDropBoxSharesPath</code>, <code>_integrationDropBoxInvoicesPath</code>,\
    \ <code>_integrationDropBoxSharedOrganizationFilesPath</code>, <code>_integrationDropBoxEmailAttachmentsPath</code>, <code>_integrationDropBoxAddressCustomFieldsPath</code>,\
    \ <code>_integrationDropBoxEventCustomFieldsPath</code>, <code>_integrationDropBoxInventoryObjectCustomFieldsPath</code>,\
    \ <code>_integrationDropBoxContractDocumentsPath</code>). This fields will be moved to the <code>organization-settings</code>\
    \ endpoint soon</li>\n<li>GET/PATCH: Added the new fields <code>_selfIssuedReceiptNumberPattern</code>, <code>_selfIssuedReceiptNextNumber</code>\
    \ and <code>_selfIssuedReceiptNumberReset</code></li>\n<li>GET: Added the action <code>booking-statistics</code> to show\
    \ finance statistics of the organization</li>\n<li>PATCH: Resetting the <code>_logo</code> is now possible by setting\
    \ it to an empty value</li>\n<li>GET/PATCH/POST: Added new field <code>preselectJoinDateSetting</code> for setting the\
    \ join date automatically</li>\n<li>PATCH: When SEPA direct debit is enabled or any debit information is updated, if the\
    \ value of <code>_accessControl</code> is <code>4</code>, it will now be automatically updated to <code>0</code>.</li>\n\
    <li>GET/PATCH: [<strong><span id=\"breaking\">breaking</span></strong>] Renamed the field <code>country</code> to <code>countryCode</code>\
    \ to be more precise</li>\n<li>GET: <code>moduleChatEnabled</code> informs on whether the chat feature is enabled, or\
    \ not</li>\n<li>GET: Added new field <code>availableSkr42Spheres</code> to list all SKR42 spheres that the organization\
    \ has available</li>\n<li>GET: [<strong><span id=\"breaking\">breaking</span></strong>] Removed the field <code>calendarImportUrl</code>\
    \ use instead the <code>member/me/personal-calendar-export-url</code> action</li>\n<li>GET/PATCH: [<strong><span id=\"\
    breaking\">breaking</span></strong>] Remove fields <code>invoiceDefaultTax</code> and <code>invoiceDefaultTaxPercentage</code></li>\n\
    <li>GET/PATCH: Added new fields <code>invoiceDefaultTaxRate</code> and <code>invoiceDefaultTaxRateForMembershipFees</code>\
    \ referencing <code>custom-tax-rate</code> objects for the default tax rate for invoices and membership fee invoices.\
    \ These fields replace <code>invoiceDefaultTax</code> and <code>invoiceDefaultTaxPercentage</code> respectively.</li>\n\
    <li>GET/PATCH: Added new fields <code>invoiceDefaultGross</code> and <code>invoiceDefaultGrossForMembershipFees</code>\
    \ to represent whether the corresponding default tax rates include taxes or not</li>\n<li>GET/PATCH: Only sepa allowed\
    \ characters can be used for the field <code>_debitName</code> now. The default of the <code>_debitName</code> field is\
    \ no longer <code>None</code> but an empty string</li>\n<li>PATCH: The fields <code>primaryColor</code> and <code>secondaryColor</code>\
    \ are no longer nullable</li>\n<li>ALL: Added new fields <code>use_automated_matrix_chat</code> and <code>matrix_moderator_ids</code>\
    \ to handle automated Matrix chat room management for member groups</li>\n</ul>\n</li>\n<li>\n<h4>organization-settings:</h4>\n\
    <ul>\n<li>PATCH/GET: Added a new setting <code>limitParticipationsPerWeekWithMemberGroup</code> to enable the organization\
    \ to limit the participations of a user per week</li>\n<li>ALL [<strong><span id=\"breaking\">breaking</span></strong>]:\
    \ Renamed <code>_emailTextTemplateApplication</code> to <code>_emailTextTemplateMembershipConfirmation</code> and <code>_emailTextTemplateApplicationSubject</code>\
    \ to <code>_emailTextTemplateMembershipConfirmationSubject</code> and <code>defaultSmtpEmailSettingForApplications</code>\
    \ to <code>defaultSmtpEmailSettingForMembershipConfirmations</code></li>\n<li>GET/PATCH: Added the new <code>_integrationDropBoxPublicFilesPath</code>\
    \ setting to enable public files from dropbox</li>\n<li>GET/PATCH: Added the new <code>personalSettingsSuccessMessages</code>\
    \ setting in personal settings</li>\n<li>GET/PATCH: [<strong><span id=\"breaking\">breaking</span></strong>] Renamed the\
    \ field <code>appNotificationEventMoved</code> to <code>appNotificationEventChanged</code></li>\n<li>PATCH: Chairmen can\
    \ now change the field <code>allowOIDCPublicApplications</code></li>\n<li>PATCH/GET: [<strong><span id=\"breaking\">breaking</span></strong>]\
    \ Renamed the field <code>appNotificationMemberCustomFieldRequesRefused</code> to <code>appNotificationMemberCustomFieldRequestRefused</code>\
    \ fixing a typo</li>\n</ul>\n</li>\n<li>\n<h4>organization-token:</h4>\n<ul>\n<li>GET: Made the field <code>created</code>\
    \ visible (read only)</li>\n<li>PATCH: Enabled this endpoint for bulk-updates</li>\n<li>ALL: Supporting different chairmanlevel\
    \ for each token now</li>\n</ul>\n</li>\n<li>\n<h4>member:</h4>\n<ul>\n<li>GET: Enabled ordering for <code>groupObject__orderSequence</code>\
    \ in <code>member/$id/groups</code></li>\n<li>POST/PATCH: <code>emailOrUserName</code> cannot contain any whitespaces\
    \ anymore</li>\n<li>POST/PATCH/GET: Added a new attribute <code>resignationNoticeDate</code> to allow admins to set when\
    \ a user has handed in their resignation or to register when a user has cancelled their membership using the corresponding\
    \ form</li>\n<li>POST: Fixed that requesting fields in <code>member/$id/custom-fields/bulk-create</code> in a <code>bulk-create</code>\
    \ does not lead to a crash</li>\n<li>PATCH: [<strong><span id=\"breaking\">breaking</span></strong>] Removed: <code>/me/set-smtp-password</code>\
    \ -&gt; use the new smtp-email-setting endpoint instead</li>\n<li>POST: Fixed that <code>member/me/change-password</code>\
    \ does not crash</li>\n<li>POST: Changed that the API tolerates to skip the 2FA and <code>currentPassword</code> if the\
    \ user has login just now</li>\n<li>GET: Added the new virtual field <code>applicationKind</code> to show the kind of\
    \ the application</li>\n<li>GET: Enabled normal members to see member groups in <code>member/$id/groups</code></li>\n\
    <li>GET: Searching will now also consider the <code>companyName</code></li>\n<li>GET: Changed that organization tokens\
    \ cannot trigger the welcome email using the <code>send-welcome-mail</code> endpoint</li>\n<li>PATCH: Fixed a bug causing\
    \ a crash when a chairman has no permissions for <code>module_account</code> and whats to change something in <code>member/$id/groups</code></li>\n\
    <li>POST: Added a generic <code>email-notification</code> action to this endpoint, analog to <code>notification</code>\
    \ for app-notifications but for email-notifications. This action currently supports <code>emailNotificationConfirmResignation</code></li>\n\
    <li>POST/PATCH/GET: Added the field <code>integrationLsbSport</code></li>\n<li>PATCH: Added a new action <code>set-lsb</code>\
    \ to add or remove lsb sports to a member and creating new LsbSport entries for the new <code>lsb-sport</code> endpoint\
